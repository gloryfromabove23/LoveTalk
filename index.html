<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LoveTalk 💖</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="loginDiv">
    <h1>LoveTalk 💖</h1>
    <input id="nameInput" placeholder="Enter your name" />
    <input type="file" id="picInput" accept="image/*" />
    <button id="loginBtn">Create Account / Login</button>
</div>

<div id="mainDiv" style="display:none;">
    <div id="logoDiv">
        <img src="logo.svg" alt="LoveTalk Logo" id="logo" />
    </div>
    <div id="voiceCircle">
        <img id="profilePic" src="" alt="">
        <div id="username"></div>
        <canvas id="voiceGlow"></canvas>
    </div>
    <button id="callBtn" class="bigBtn">📞 Call</button>
    <button id="hangupBtn" class="bigBtn">🛑 Hang Up</button>
    <button id="heartBtn" class="reactionBtn">💗</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="client.js"></script>
</body>
</html>
