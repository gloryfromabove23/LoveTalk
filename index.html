<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoveTalk ♥︎ | Premium Connection</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root { 
    /* Soft, low-strain palette */
    --bg-deep: #1a1a1c;
    --bg-surface: #242426;
    --text-main: #e4e4e7;
    --text-dim: #a1a1aa;
    --accent-teal: #82e9de;
    --accent-rose: #f472b6;
    --apple-blue: #007aff;
    --glass: rgba(255, 255, 255, 0.03);
    --glass-border: rgba(255, 255, 255, 0.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }

body { 
    font-family: 'Plus Jakarta Sans', sans-serif;
    background-color: var(--bg-deep);
    color: var(--text-main);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* SLEEK HEADER */
header {
    height: 80px;
    padding: 0 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--bg-deep);
    border-bottom: 1px solid var(--glass-border);
}

.logo-container { display: flex; align-items: center; gap: 12px; }
.logo-heart { width: 32px; height: 32px; fill: var(--accent-rose); filter: drop-shadow(0 0 8px rgba(244, 114, 182, 0.3)); }
.brand-name { font-weight: 700; font-size: 22px; letter-spacing: -0.5px; color: var(--text-main); }

.profile-chip {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    padding: 8px 18px;
    border-radius: 100px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    font-weight: 500;
}

/* MAIN APP STRUCTURE */
#mainApp { display: flex; flex: 1; overflow: hidden; }

/* CHAT PANEL (UNCHANGED AS REQUESTED) */
#chatPanel { flex: 1.3; padding: 20px; display: flex; flex-direction: column; }
.chat-window {
    flex: 1; background: #ffffff; border-radius: 32px; display: flex; flex-direction: column;
    overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.2);
}
.chat-header { padding: 15px; text-align: center; background: #fbfbfd; border-bottom: 1px solid #efeff4; color: #1d1d1f; font-weight: 700; font-size: 13px; }
#messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; background: #fff; }

.msg { max-width: 75%; display: flex; flex-direction: column; }
.msg.mine { align-self: flex-end; align-items: flex-end; }
.msg.other { align-self: flex-start; align-items: flex-start; }
.bubble { padding: 10px 18px; border-radius: 20px; font-size: 15px; line-height: 1.4; }
.msg.mine .bubble { background: var(--apple-blue); color: white; border-bottom-right-radius: 4px; }
.msg.other .bubble { background: #e9e9eb; color: black; border-bottom-left-radius: 4px; }

.chat-footer { padding: 15px; background: #fff; border-top: 1px solid #efeff4; }
.input-group { display: flex; align-items: center; gap: 12px; background: #f2f2f7; padding: 6px 16px; border-radius: 100px; }
.input-group input { flex: 1; border: none; background: transparent; padding: 10px; outline: none; font-size: 15px; color: #000; }

/* REDESIGNED CONTROL HUB */
#hubPanel {
    flex: 0.7;
    background: var(--bg-surface);
    margin: 20px 20px 20px 0;
    border-radius: 32px;
    display: flex;
    flex-direction: column;
    padding: 30px;
    gap: 30px;
    border: 1px solid var(--glass-border);
}

.hub-section h4 { 
    font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; 
    color: var(--text-dim); margin-bottom: 15px; font-weight: 700;
}

.user-list { height: 120px; overflow-y: auto; }
.user-item { 
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 0; border-bottom: 1px solid var(--glass-border);
    font-size: 14px; color: var(--text-main); transition: 0.2s;
}
.user-item:hover { color: var(--accent-teal); cursor: pointer; }

/* MODAL-LIKE CALL DISPLAY */
.call-display {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; gap: 10px;
}
#mainStatus { font-size: 38px; font-weight: 800; letter-spacing: -1px; }
#subStatus { color: var(--text-dim); font-size: 14px; }

/* MODERN ICON BUTTONS */
.action-bar { display: flex; gap: 20px; align-items: center; justify-content: center; margin-top: 20px; }
.icon-btn {
    width: 60px; height: 60px; border-radius: 20px; border: 1px solid var(--glass-border);
    background: var(--glass); color: var(--text-main); cursor: pointer; transition: 0.3s;
    display: flex; align-items: center; justify-content: center;
}
.icon-btn:hover { background: var(--glass-border); transform: translateY(-3px); }
.icon-btn.primary { width: 80px; height: 80px; background: var(--accent-teal); border: none; color: #121212; border-radius: 28px; }
.icon-btn.danger { color: var(--accent-rose); }
.icon-btn svg { width: 24px; height: 24px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

/* MEME DRAWER */
#memeDrawer { display: none; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 15px; background: #f2f2f7; max-height: 200px; overflow-y: auto; }
.meme-card { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 12px; cursor: pointer; }

@media (max-width: 900px) {
    #mainApp { flex-direction: column; overflow-y: auto; }
    #hubPanel { margin: 20px; flex: none; }
    #chatPanel { height: 550px; flex: none; }
}
</style>
</head>
<body>

<header>
    <div class="logo-container" onclick="location.reload()">
        <svg class="logo-heart" viewBox="0 0 24 24">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l8.84-8.84 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
        </svg>
        <div class="brand-name">LoveTalk</div>
    </div>
    <div style="display: flex; gap: 15px;">
        <div class="profile-chip">
            <span style="width: 8px; height: 8px; border-radius: 50%; background: var(--accent-teal);"></span>
            <span id="myUsername">User</span>
        </div>
        <button onclick="toggleLog()" class="icon-btn" style="width: 42px; height: 42px; border-radius: 12px;">
            <svg viewBox="0 0 24 24"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        </button>
    </div>
</header>

<div id="mainApp">
    <section id="chatPanel">
        <div class="chat-window">
            <div class="chat-header" id="activePeer">IDLE</div>
            <div id="messages">
                <div style="margin: auto; color: #a1a1aa; font-size: 13px;">Find a connection to start messaging.</div>
            </div>
            <div id="memeDrawer"></div>
            <div class="chat-footer">
                <div class="input-group">
                    <button onclick="toggleMemes()" style="background:none; border:none; cursor:pointer; font-size:20px;">☺︎</button>
                    <input type="text" id="msgInput" placeholder="iMessage" onkeydown="if(event.key==='Enter')sendMsg()">
                    <button onclick="sendMsg()" style="background:var(--apple-blue); border:none; color:white; width:30px; height:30px; border-radius:50%; cursor:pointer;">↑</button>
                </div>
            </div>
        </div>
    </section>

    <section id="hubPanel">
        <div class="hub-section">
            <h4>Live Activity</h4>
            <div class="user-list" id="onlineBox"></div>
        </div>

        <div class="call-display">
            <h1 id="mainStatus">Ready</h1>
            <p id="subStatus">Secure, private, anonymous.</p>
        </div>

        <div class="action-bar">
            <button class="icon-btn danger" onclick="reportUser()">
                <svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0zM12 9v4m0 4h.01"></path></svg>
            </button>

            <button class="icon-btn primary" onclick="handleCall()" id="callBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
            </button>

            <button class="icon-btn" onclick="addFav()">
                <svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>
            </button>
        </div>

        <div class="hub-section" style="margin-top:auto">
            <h4>Saved Souls</h4>
            <div class="user-list" id="favBox"></div>
        </div>
    </section>
</div>

<script>
let currentCall = null;
let favorites = JSON.parse(localStorage.getItem('lt_saved') || '[]');

const firsts = ["Aura", "Luna", "Nova", "Silas", "Cyrus", "Atlas", "Sage", "Lyra", "Eon", "Zion"];
const lasts = ["Vibe", "Flow", "Soul", "Gaze", "Ember", "Pulse", "Wisp", "Echo", "Mist", "Stellar"];

function init() {
    let user = localStorage.getItem('lt_user');
    if(!user) {
        user = firsts[Math.floor(Math.random()*10)] + (Math.floor(Math.random()*89)+10);
        localStorage.setItem('lt_user', user);
    }
    document.getElementById('myUsername').innerText = user;
    renderFavs();
    renderOnline();
    loadMemes();
}

function handleCall() {
    if(currentCall) endCall();
    else findMatch();
}

function findMatch() {
    const btn = document.getElementById('callBtn');
    document.getElementById('mainStatus').innerText = "Linking...";
    btn.style.background = "var(--accent-rose)";
    
    setTimeout(() => {
        currentCall = firsts[Math.floor(Math.random()*10)] + lasts[Math.floor(Math.random()*10)];
        document.getElementById('mainStatus').innerText = "Connected";
        document.getElementById('subStatus').innerText = "Speaking with " + currentCall;
        document.getElementById('activePeer').innerText = currentCall.toUpperCase();
        addMsg(`Private connection established.`, 'system');
    }, 1500);
}

function endCall() {
    currentCall = null;
    document.getElementById('mainStatus').innerText = "Ready";
    document.getElementById('subStatus').innerText = "Secure, private, anonymous.";
    document.getElementById('activePeer').innerText = "IDLE";
    document.getElementById('callBtn').style.background = "var(--accent-teal)";
    addMsg("Call ended.", "system");
}

function sendMsg() {
    const input = document.getElementById('msgInput');
    if(!input.value.trim() || !currentCall) return;
    addMsg(input.value, 'mine');
    input.value = "";
    setTimeout(() => { if(currentCall) addMsg("That makes sense.", 'other'); }, 1500);
}

function addMsg(text, type) {
    const box = document.getElementById('messages');
    const div = document.createElement('div');
    if(type === 'system') {
        div.style.cssText = "text-align:center; font-size:11px; color:#666; margin:15px 0;";
        div.innerText = text;
    } else {
        div.className = "msg " + type;
        div.innerHTML = `<div class="bubble">${text}</div>`;
    }
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}

function toggleMemes() {
    const d = document.getElementById('memeDrawer');
    d.style.display = d.style.display === 'grid' ? 'none' : 'grid';
}

async function loadMemes() {
    try {
        const res = await fetch('https://api.imgflip.com/get_memes');
        const data = await res.json();
        document.getElementById('memeDrawer').innerHTML = data.data.memes.slice(0, 60).map(m => 
            `<img src="${m.url}" class="meme-card" onclick="sendMeme('${m.url}')">`
        ).join('');
    } catch(e) {}
}

function sendMeme(url) {
    if(!currentCall) return;
    addMsg(`<img src="${url}" style="width:100%; border-radius:12px;">`, 'mine');
    toggleMemes();
}

function addFav() {
    if(!currentCall || favorites.includes(currentCall)) return;
    favorites.push(currentCall);
    localStorage.setItem('lt_saved', JSON.stringify(favorites));
    renderFavs();
}

function renderFavs() {
    document.getElementById('favBox').innerHTML = favorites.map(f => `<div class="user-item"><span>♥ ${f}</span></div>`).join('');
}

function renderOnline() {
    const box = document.getElementById('onlineBox');
    for(let i=0; i<4; i++) {
        let n = firsts[Math.floor(Math.random()*10)] + lasts[Math.floor(Math.random()*10)];
        box.innerHTML += `<div class="user-item"><span>${n}</span><span style="font-size:8px; color:var(--accent-teal)">●</span></div>`;
    }
}

function reportUser() { if(currentCall) { alert("User Reported."); endCall(); } }
function toggleLog() { alert("Call logs are encrypted and private to this device."); }

init();
</script>
</body>
</html>
