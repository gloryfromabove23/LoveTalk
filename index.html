<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LoveTalk 💖</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bubblegum+Sans&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Bubblegum Sans', cursive;
            background: linear-gradient(135deg, #ffc1cc, #ffb6c1);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            margin-top: 40px;
            color: #fff;
            text-shadow: 2px 2px #ff69b4;
        }

        #joinSection, #chatArea {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 20px;
            margin-top: 30px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        input {
            width: 70%;
            padding: 10px;
            border-radius: 15px;
            border: none;
            margin-right: 10px;
            outline: none;
        }

        button {
            padding: 10px 15px;
            border-radius: 15px;
            border: none;
            background-color: #ff69b4;
            color: #fff;
            cursor: pointer;
            font-weight: bold;
        }

        #messages {
            border: 2px solid #fff;
            border-radius: 15px;
            height: 250px;
            overflow-y: auto;
            padding: 10px;
            margin-bottom: 10px;
            background: rgba(255,255,255,0.3);
        }

        p {
            margin: 5px 0;
            word-wrap: break-word;
        }

        ::placeholder {
            color: #ffeff0;
        }
    </style>
</head>
<body>
    <h1>LoveTalk 💖</h1>

    <div id="joinSection">
        <input id="roomInput" placeholder="Enter a room name" />
        <button id="joinBtn">Join</button>
    </div>

    <div id="chatArea" style="display:none;">
        <div id="messages"></div>
        <input id="msgInput" placeholder="Type your message..." />
        <button id="sendBtn">Send</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="client.js"></script>
</body>
</html>
