<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LoveTalk ♥︎</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root { --main-bg: linear-gradient(-45deg, #FF9A8B, #FF6A88, #FF99AC); }
body { margin: 0; font-family: 'Inter', sans-serif; background: var(--main-bg); background-size: 300% 300%; animation: grad 12s ease infinite; color: white; overflow-x: hidden; min-height: 100vh; display: flex; flex-direction: column; }
@keyframes grad { 0% { background-position: 0% 50% } 50% { background-position: 100% 50% } 100% { background-position: 0% 50% } }

#topBar { padding: 15px 30px; display: flex; justify-content: flex-end; background: rgba(0,0,0,0.1); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 1000; }
.theme-btn { background: white; color: black; border: none; padding: 8px 16px; border-radius: 20px; font-weight: 700; cursor: pointer; font-size: 10px; text-transform: uppercase; }

#appView { display: flex; flex: 1; width: 100%; height: calc(100vh - 60px); }

/* Left Panel - Now persistent 50% width */
#leftPanel { width: 50%; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px); border-right: 1px solid rgba(255, 255, 255, 0.1); display: flex; flex-direction: column; padding: 0; flex-shrink: 0; }
#chatBox { display: flex; flex-direction: column; height: 100%; background: #ffffff; overflow: hidden; }

/* Center Panel - Love Talk Side */
#centerPanel { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 20px; text-align: center; position: relative; overflow-y: auto; }

/* Header Layout for Online/Connections */
.list-container { display: flex; width: 100%; gap: 10px; margin-bottom: 20px; }
.list-box { flex: 1; background: rgba(0,0,0,0.2); border-radius: 15px; padding: 15px; height: 150px; overflow-y: auto; text-align: left; }
.list-box h4 { margin: 0 0 10px 0; font-size: 12px; letter-spacing: 1px; opacity: 0.8; }
.user-item { font-size: 13px; padding: 5px 0; cursor: pointer; transition: 0.2s; }
.user-item:hover { color: #4BFF8B; }

/* Logo & flicker */
#logoContainer { width: 160px; height: 160px; margin-top: 20px; }
.heart-cutout { fill: #4BFF8B; opacity: 0; transition: opacity 0.1s; }
.flicker { animation: heartPulse 0.15s infinite alternate; }
@keyframes heartPulse { from { opacity: 0.3; } to { opacity: 1; } }

/* Horizontal Buttons */
.callButtons { display: flex; flex-direction: row; gap: 20px; margin-top: 30px; justify-content: center; }
.circleBtn { width: 70px; height: 70px; border: none; border-radius: 50%; background: rgba(255,255,255,0.15); cursor: pointer; position: relative; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
.label-tag { position: absolute; bottom: -25px; background: white; padding: 3px 8px; border-radius: 6px; font-size: 9px; font-weight: 900; color: black; }

/* Message Styles */
#messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding: 20px; color: #000; }
.msg-container { display: flex; flex-direction: column; max-width: 80%; }
.msg-container.mine { align-self: flex-end; align-items: flex-end; }
.msg-bubble { padding: 10px 15px; border-radius: 18px; font-size: 14px; background: #e5e5ea; color: black; }
.mine .msg-bubble { background: #007aff; color: white; }

/* Footer / Mission */
#footerSpace { padding: 300px 15% 100px; text-align: center; background: white; color: #333; }

/* Context Menu */
#contextMenu { display: none; position: fixed; background: #1a1a1a; border: 1px solid #333; border-radius: 10px; padding: 10px; z-index: 3000; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
#contextMenu button { display: block; width: 100%; background: none; border: none; color: white; padding: 8px 20px; text-align: left; cursor: pointer; font-size: 12px; }
#contextMenu button:hover { background: #333; }

@media (max-width: 900px) {
    #appView { flex-direction: column; height: auto; }
    #leftPanel { width: 100%; order: 2; height: 600px; }
    #centerPanel { width: 100%; order: 1; height: auto; min-height: 600px; }
}
</style>
</head>
<body>

<div id="topBar"><button class="theme-btn" onclick="openMod('cModal')">Edit Canvas</button></div>

<div id="appView">
    <div id="leftPanel">
        <div id="chatBox">
            <div style="padding:15px; background:#f9f9f9; border-bottom:1px solid #ddd; color:#000; text-align:center; font-weight:800;">LIVE CHAT</div>
            <div id="messages"></div>
            <div id="typingArea" style="display:none; padding:10px 20px; color:#8e8e93; font-size:12px;">Someone is typing...</div>
            <div id="memeGallery" style="display:none; grid-template-columns: repeat(3, 1fr); gap:4px; padding:8px; background:#f2f2f7; max-height:200px; overflow-y:auto;"></div>
            <div style="display:flex; gap:8px; padding:15px; border-top: 1px solid #eee; align-items:center;">
                <button onclick="toggleMemeGallery()" style="background:none; border:none; cursor:pointer; font-size:20px;">🎲</button>
                <input id="msgInput" onkeydown="if(event.key==='Enter')sendMsg()" style="flex:1; background:#f2f2f7; border:none; color:black; padding:12px; border-radius:20px; outline:none;" placeholder="iMessage">
                <button onclick="sendMsg()" style="background:#007aff; color:#fff; border:none; border-radius:50%; width:35px; height:35px; cursor:pointer;">↑</button>
            </div>
        </div>
    </div>

    <div id="centerPanel">
        <div class="list-container">
            <div class="list-box">
                <h4>VERIFIED HUMANS</h4>
                <div id="onlineList">
                    <div class="user-item" onclick="showUserActions(event, 'User_882')">🟢 User_882</div>
                    <div class="user-item" onclick="showUserActions(event, 'Human_412')">🟢 Human_412</div>
                    <div class="user-item" onclick="showUserActions(event, 'Soul_77')">🟢 Soul_77</div>
                </div>
            </div>
            <div class="list-box">
                <h4>CONNECTIONS</h4>
                <div id="connDD">
                    <div class="user-item" onclick="showUserActions(event, 'Saved_One')">♥ Saved_One</div>
                </div>
            </div>
        </div>

        <div id="logoContainer">
            <svg viewBox="0 0 100 100">
                <defs><mask id="m"><rect width="100" height="100" fill="white"/><path d="M50 65 C45 60 30 55 30 42 A12 12 0 0 1 50 35 A12 12 0 0 1 70 42 C70 55 55 60 50 65" fill="black"/></mask></defs>
                <path fill="white" d="M20 15 H80 Q88 15 88 23 V68 Q88 76 80 76 H45 L30 90 V76 Q12 76 12 68 V23 Q12 15 20 15 Z" mask="url(#m)"/>
                <path id="heartIcon" class="heart-cutout" d="M50 65 C45 60 30 55 30 42 A12 12 0 0 1 50 35 A12 12 0 0 1 70 42 C70 55 55 60 50 65"/>
            </svg>
        </div>
        
        <div style="font-size: 3.5rem; font-weight: 800; letter-spacing: -3px; margin-top: 10px;">LoveTalk</div>
        <div id="status">READY</div>

        <div class="callButtons">
            <button class="circleBtn" onclick="muteT()">
                <svg viewBox="0 0 100 100" width="30" fill="white"><rect x="44" y="25" width="12" height="30" rx="6"/><path d="M35 46 a15 15 0 0 0 30 0" fill="none" stroke="white" stroke-width="5"/></svg>
                <div class="label-tag">MUTE</div>
            </button>
            <button class="circleBtn" style="width:90px; height:90px; background:#4BFF8B;" onclick="handleCall()">
                <svg viewBox="0 0 100 100" width="40"><rect x="35" y="20" width="30" height="60" rx="6" fill="none" stroke="black" stroke-width="4"/><circle cx="50" cy="72" r="3" fill="black"/></svg>
                <div class="label-tag" style="bottom:-15px">CALL</div>
            </button>
            <button class="circleBtn" onclick="showOverlay('addOverlay')">
                <svg viewBox="0 0 100 100" width="30"><path d="M50 30 v40 M30 50 h40" stroke="white" stroke-width="10" stroke-linecap="round"/></svg>
                <div class="label-tag">ADD</div>
            </button>
            <button class="circleBtn" onclick="showOverlay('reportOverlay')">
                <text x="50" y="70" text-anchor="middle" fill="white" font-size="50" font-weight="900">!</text>
                <div class="label-tag">BLOCK</div>
            </button>
        </div>
    </div>
</div>

<div id="contextMenu">
    <button onclick="handleCall()">Call User</button>
    <button onclick="showOverlay('addOverlay')">Add Friend</button>
    <button style="color:#FF4B4B" onclick="showOverlay('reportOverlay')">Block User</button>
</div>

<div id="footerSpace">
    <h2>The Mission</h2>
    <p>LoveTalk is built on the foundation of <strong>Love</strong>.</p>
    <p>Scroll down to explore our commitment to genuine human connection.</p>
</div>

<div id="cModal" class="modal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:#1a1a1a; padding:20px; border-radius:20px; z-index:2000;">
    <h3>Canvas Theme</h3>
    <button class="theme-btn" onclick="setBg('linear-gradient(-45deg, #FF9A8B, #FF6A88, #FF99AC)')">Pink</button>
    <button class="theme-btn" onclick="setBg('#1a1a1a')">Dark</button>
    <button class="theme-btn" onclick="cls()">Close</button>
</div>

<script>
let peer = "";

function openMod(id) { document.getElementById(id).style.display='block'; }
function cls() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); }
function setBg(c) { document.body.style.background = c; }

// User Context Menu
function showUserActions(e, name) {
    const menu = document.getElementById('contextMenu');
    menu.style.display = 'block';
    menu.style.left = e.pageX + 'px';
    menu.style.top = e.pageY + 'px';
    window.onclick = () => { menu.style.display = 'none'; };
    e.stopPropagation();
}

function handleCall() { peer ? endCall() : startSearch(); }

function startSearch() {
    document.getElementById('status').textContent = "FINDING...";
    setTimeout(() => {
        peer = "Human_" + Math.floor(Math.random()*999);
        document.getElementById('status').textContent = "LINKED: " + peer;
        simulateTalking(); // Start the flicker
    }, 1500);
}

function simulateTalking() {
    const heart = document.getElementById('heartIcon');
    setInterval(() => {
        if(peer) heart.classList.toggle('flicker');
    }, 2000);
}

function sendMsg() {
    const input = document.getElementById('msgInput');
    if(!input.value.trim()) return;
    const container = document.createElement('div');
    container.className = "msg-container mine";
    container.innerHTML = `<div class="msg-bubble">${input.value}</div>`;
    document.getElementById('messages').appendChild(container);
    input.value = "";
    document.getElementById('messages').scrollTop = 9999;
}

async function fetchMemes() {
    const grid = document.getElementById('memeGallery');
    const res = await fetch('https://api.imgflip.com/get_memes');
    const data = await res.json();
    grid.innerHTML = data.data.memes.slice(0, 60).map(m => `<img src="${m.url}" style="width:100%; cursor:pointer" onclick="sendMeme('${m.url}')">`).join('');
}

function toggleMemeGallery() {
    const g = document.getElementById('memeGallery');
    g.style.display = g.style.display === 'grid' ? 'none' : 'grid';
    if(g.style.display === 'grid') fetchMemes();
}

function sendMeme(url) {
    const container = document.createElement('div');
    container.className = "msg-container mine";
    container.innerHTML = `<div class="msg-bubble"><img src="${url}" style="width:100%"></div>`;
    document.getElementById('messages').appendChild(container);
    document.getElementById('memeGallery').style.display = 'none';
}
</script>
</body>
</html>
