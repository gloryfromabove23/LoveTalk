<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LoveTalk ♥︎</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
/* ---------------- BASE ---------------- */
body{
    margin:0;
    font-family:'Inter',sans-serif;
    background:#16171b;
    color:white;
    display:flex;
    height:100vh;
    overflow:hidden;
    position:relative;
}

/* ---------------- FLOATING GRADIENT ---------------- */
.mesh-bg{
    position:fixed;
    width:150%;
    height:150%;
    top:-25%;
    left:-25%;
    background:
        radial-gradient(circle at 20% 30%, #F0A2A4 0%, transparent 40%),
        radial-gradient(circle at 70% 60%, #ff6f91 0%, transparent 40%);
    animation: meshMove 18s ease-in-out infinite alternate;
    z-index:-3;
}

@keyframes meshMove{
    0%{ transform:translate(0,0);}
    100%{ transform:translate(-5%,5%);}
}

/* ---------------- LAYOUT ---------------- */
#leftPanel{
    width:420px;
    background:rgba(20,20,25,0.6);
    backdrop-filter:blur(20px);
    border-right:1px solid rgba(255,255,255,0.05);
    display:flex;
    flex-direction:column;
    padding:20px;
    position:relative;
    overflow:hidden;
}

#centerPanel{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

/* ---------------- ONLINE HEADER ---------------- */
#onlineHeader{
    position:relative;
    z-index:5;
}

#onlineTop{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 5px;
    font-weight:600;
    font-size:14px;
    color:#ccc;
    cursor:pointer;
}

#toggleUsers{
    transition:0.3s;
}

#onlineDropdown{
    position:absolute;
    top:40px;
    left:0;
    right:0;
    max-height:0;
    overflow:hidden;
    background:rgba(25,25,30,0.95);
    backdrop-filter:blur(20px);
    border-radius:15px;
    transition:0.35s ease;
    overflow-y:auto;
}

#onlineDropdown.open{
    max-height:70vh;
    padding:15px;
}

.dropdownUser{
    padding:10px;
    border-radius:10px;
    margin-bottom:8px;
    background:#2a2a30;
    color:#ddd;
}

/* ---------------- CHAT ---------------- */
#chatBox{
    margin-top:auto;
    display:flex;
    flex-direction:column;
    height:65%;
    border-radius:20px;
    background:rgba(255,255,255,0.04);
    padding:15px;
}

#messages{
    flex:1;
    overflow-y:auto;
}

#messages p{
    background:rgba(255,255,255,0.08);
    padding:12px 16px;
    border-radius:18px;
    margin:8px 0;
    width:fit-content;
    max-width:75%;
    animation:popIn 0.25s ease;
}

@keyframes popIn{
    0%{ transform:scale(0.8); opacity:0;}
    100%{ transform:scale(1); opacity:1;}
}

#chatControls{
    display:flex;
    gap:10px;
    margin-top:10px;
}

#chatControls input{
    flex:1;
    padding:12px;
    border-radius:12px;
    border:none;
    background:#2b2c32;
    color:white;
}

#chatControls button{
    padding:12px 18px;
    border-radius:12px;
    border:none;
    background:#F0A2A4;
    color:black;
    font-weight:700;
    cursor:pointer;
}

/* ---------------- LOGO ---------------- */
#mainLogo{
    width:240px;
}

#brandName{
    font-size:2rem;
    font-weight:800;
    margin-top:15px;
}

.accent{
    color:#444;
}

#status{
    margin-top:8px;
    font-weight:600;
    color:#555;
}

/* ---------------- CALL CONTROLS ---------------- */
#callControls{
    margin-top:20px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:12px;
}

.callButtons{
    display:flex;
    gap:15px;
    align-items:center;
}

.circleBtn{
    width:90px;
    height:90px;
    border:none;
    background:none;
    cursor:pointer;
    padding:0;
    position:relative;
    transition:0.2s ease;
}

.smallBtn{
    width:60px;
    height:60px;
}

.circleBtn svg{
    width:100%;
    height:100%;
}

.circleBtn:hover{
    transform:scale(1.05);
}

/* Loading animation for call button */
#callLoader{
    position:absolute;
    top:0; left:0;
    width:100%; height:100%;
    border-radius:50%;
    border:4px solid rgba(255,255,255,0.3);
    border-top-color:#F0A2A4;
    display:none;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    0%{ transform:rotate(0deg);}
    100%{ transform:rotate(360deg);}
}

.autoCallWrap{
    color:#888;
    font-size:14px;
    margin-top:4px;
}
</style>
</head>

<body>

<div class="mesh-bg"></div>

<!-- LEFT PANEL -->
<div id="leftPanel">
    <div id="onlineHeader">
        <div id="onlineTop">
            <span id="onlineCount">People Online (0)</span>
            <span id="toggleUsers">▼</span>
        </div>
        <div id="onlineDropdown"></div>
    </div>

    <div id="chatBox">
        <div id="messages"></div>
        <div id="chatControls">
            <input id="msgInput" placeholder="Say something...">
            <button id="sendBtn">Send</button>
        </div>
    </div>
</div>

<!-- CENTER PANEL -->
<div id="centerPanel">

<svg id="mainLogo" viewBox="0 0 100 100">
  <path fill="white" fill-rule="evenodd"
        d="M10 30 Q10 10 30 10 H70 Q90 10 90 30 V70 Q90 90 70 90 H30 Q10 90 10 70 Z
           M50 65 C35 50,30 40,40 35 C45 32,50 38,50 38 C50 38,55 32,60 35 C70 40,65 50,50 65Z"/>
  <polygon points="30,80 45,95 45,80" fill="white"/>
</svg>

<div id="brandName">Love<span class="accent">Talk</span></div>
<div id="status">Online</div>

<!-- CALL CONTROLS -->
<div id="callControls">
  <div class="callButtons">
    <button id="callBtn" class="circleBtn" title="Call">
      <svg viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="40" fill="white"/>
        <path id="callIcon" fill="transparent" stroke="white" stroke-width="4" stroke-linecap="round"
              d="M35 40 Q45 30 55 40 L60 45 Q65 50 60 55 L55 60 Q50 65 45 60 L40 55 Q35 50 40 45 Z"/>
      </svg>
      <div id="callLoader"></div>
    </button>

    <button id="muteBtn" class="circleBtn smallBtn" title="Mute">
      <svg viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="35" fill="white"/>
        <path d="M40 35 L60 65 M60 35 L40 65" stroke="transparent" stroke-width="5"/>
      </svg>
    </button>

    <button id="addFriendBtn" class="circleBtn smallBtn" title="Add Friend">
      <svg viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="35" fill="white"/>
        <path d="M50 35 L50 65 M35 50 L65 50" stroke="transparent" stroke-width="5"/>
      </svg>
    </button>
  </div>
  <label class="autoCallWrap"><input type="checkbox" id="autoCall"> Auto Call</label>
</div>

<script>
/* ---------------- RANDOM USER GENERATION ---------------- */
const adjectives = ["Neo","Luxe","Echo","Pixel","Nova","Vibe","Drift","Quantum","Hyper","Aurora"];
const nouns = ["Wave","Pulse","Phase","Drift","Core","Orbit","Flux","Spark","Blade","Shade"];

function generateUsername(){
  return adjectives[Math.floor(Math.random()*adjectives.length)] +
         nouns[Math.floor(Math.random()*nouns.length)] +
         Math.floor(Math.random()*900+100);
}

const users = [];
const onlineDropdown = document.getElementById("onlineDropdown");
const onlineCount = document.getElementById("onlineCount");
const toggleUsers = document.getElementById("toggleUsers");

function updateOnlineUI(){
    onlineDropdown.innerHTML="";
    users.forEach(u=>{
        const div=document.createElement("div");
        div.className="dropdownUser";
        div.textContent=u;
        onlineDropdown.appendChild(div);
    });
    onlineCount.textContent=`People Online (${users.length})`;
}

function addUser(name){
    users.push(name);
    updateOnlineUI();
}

addUser(generateUsername());

toggleUsers.onclick=()=>{
    onlineDropdown.classList.toggle("open");
    toggleUsers.style.transform =
        onlineDropdown.classList.contains("open") ? "rotate(180deg)" : "rotate(0deg)";
};

/* ---------------- CHAT ---------------- */
sendBtn.onclick=()=>{
    if(msgInput.value.trim()){
        let p=document.createElement("p");
        p.textContent=msgInput.value;
        messages.appendChild(p);
        msgInput.value="";
        messages.scrollTop=messages.scrollHeight;
    }
};

/* ---------------- CALL BUTTON LOGIC ---------------- */
const callBtn = document.getElementById('callBtn');
const callIcon = document.getElementById('callIcon');
const callLoader = document.getElementById('callLoader');
let calling = false;

callBtn.addEventListener('click', () => {
    if(!calling){
        callLoader.style.display = 'block';
        setTimeout(() => {
            callLoader.style.display = 'none';
            // Hang up icon
            callIcon.setAttribute('d','M30 60 Q50 75 70 60 L65 55 Q50 65 35 55 Z');
            calling = true;
        }, 2000); // simulate connection
    } else {
        callIcon.setAttribute('d','M35 40 Q45 30 55 40 L60 45 Q65 50 60 55 L55 60 Q50 65 45 60 L40 55 Q35 50 40 45 Z');
        calling = false;
    }
});
</script>

</body>
</html>
