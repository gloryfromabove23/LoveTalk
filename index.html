<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LoveTalk ♥︎</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root { --main-bg: linear-gradient(-45deg, #FF9A8B, #FF6A88, #FF99AC); }
body { margin: 0; font-family: 'Inter', sans-serif; background: var(--main-bg); background-size: 300% 300%; animation: grad 12s ease infinite; color: white; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
@keyframes grad { 0% { background-position: 0% 50% } 50% { background-position: 100% 50% } 100% { background-position: 0% 50% } }

#topBar { padding: 10px 20px; display: flex; justify-content: flex-end; background: rgba(0,0,0,0.1); backdrop-filter: blur(10px); z-index: 100; }
.theme-btn { background: white; color: black; border: none; padding: 8px 16px; border-radius: 20px; font-weight: 700; cursor: pointer; font-size: 10px; text-transform: uppercase; }

#appView { display: flex; flex: 1; overflow: hidden; }

/* Desktop View */
#leftPanel { width: 500px; background: rgba(15, 15, 20, 0.95); backdrop-filter: blur(20px); border-right: 1px solid rgba(255, 255, 255, 0.1); display: flex; flex-direction: column; padding: 20px; flex-shrink: 0; }
#centerPanel { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }

/* Dropdown Tabs */
.dropdown-head { cursor:pointer; display: flex; justify-content: space-between; font-weight: 800; padding: 12px 5px; border-bottom: 1px solid rgba(255,255,255,0.1); text-transform: uppercase; font-size: 10px; letter-spacing: 1px; }
.dropdown-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; background: rgba(255, 255, 255, 0.03); border-radius: 8px; }
.dropdown-content.open { max-height: 120px; overflow-y: auto; padding: 10px; margin-top: 5px; margin-bottom: 5px; }

#chatBox { margin-top: 15px; display: flex; flex-direction: column; flex-grow: 1; background: rgba(0, 0, 0, 0.3); border-radius: 15px; padding: 15px; border: 1px solid rgba(255,255,255,0.1); overflow: hidden; }
#messages { flex: 1; overflow-y: auto; font-size: 14px; }
#messages p { background: rgba(255, 255, 255, 0.08); padding: 10px; border-radius: 10px; margin: 5px 0; max-width: 85%; }

#brandName { font-size: 3.5rem; font-weight: 800; margin: 0; letter-spacing: -3px; }
#status { font-weight: 600; opacity: 0.6; letter-spacing: 2px; text-transform: uppercase; font-size: 9px; margin-bottom: 30px; }

/* Animation Logic */
@keyframes spin360 { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
.searching .phone-svg { animation: spin360 1s linear infinite; }
#phoneScreen { fill: rgba(255, 255, 255, 0.1); transition: fill 0.3s; }
.connected #phoneScreen { fill: #FF4B4B; }
#endCallText { position: absolute; bottom: -20px; width: 100%; text-align: center; font-size: 10px; font-weight: 800; color: #FF4B4B; display: none; }

.callButtons { display: flex; gap: 20px; align-items: center; justify-content: center; }
.circleBtn { width: 80px; height: 80px; border: none; background: transparent; cursor: pointer; position: relative; display: flex; align-items: center; justify-content: center; }

/* VERTICAL SPLIT FOR NARROW WINDOWS */
@media (max-width: 900px) {
    #appView { flex-direction: column; }
    #leftPanel { width: 100%; height: 50%; border-right: none; border-bottom: 1px solid rgba(255,255,255,0.1); }
    #centerPanel { width: 100%; height: 50%; }
    #brandName { font-size: 2.5rem; }
}

.modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 300px; background: #111; border-radius: 20px; padding: 25px; z-index: 1000; text-align: center; border: 1px solid #333; }
.color-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
.color-opt { height: 35px; border-radius: 8px; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); }
</style>
</head>
<body>

<div id="topBar"><button class="theme-btn" onclick="openMod('cModal')">Edit Canvas</button></div>

<div id="appView">
    <div id="leftPanel">
        <div class="dropdown-head" onclick="toggleDD('onlineDD')"><span>Online People</span> <span id="onlineCount">241</span></div>
        <div id="onlineDD" class="dropdown-content">
            <div style="font-size:11px; padding:2px; opacity:0.8;">• PixelHeart_99</div>
            <div style="font-size:11px; padding:2px; opacity:0.8;">• Neon_Vibe</div>
            <div style="font-size:11px; padding:2px; opacity:0.8;">• QuietStorm</div>
        </div>

        <div class="dropdown-head" onclick="toggleDD('connDD')"><span>Connections</span></div>
        <div id="connDD" class="dropdown-content"><div id="connEmpty" style="opacity:0.3; text-align:center; padding:10px; font-size:11px;">No friends added yet</div></div>
        
        <div id="chatBox">
            <div id="messages"></div>
            <div style="display:flex; gap:8px; margin-top:10px;">
                <input id="msgInput" onkeydown="if(event.key==='Enter')sendMsg()" style="flex:1; background:rgba(255,255,255,0.08); border:none; color:white; padding:12px; border-radius:10px; outline:none;" placeholder="Message...">
                <button onclick="sendMsg()" style="background:#fff; color:#000; border:none; border-radius:10px; padding:0 15px; cursor:pointer; font-weight:800; font-size:10px;">SEND</button>
            </div>
        </div>
    </div>

    <div id="centerPanel">
        <div id="brandName">Love<span style="font-weight:100">Talk</span></div>
        <div id="status">Ready</div>
        
        <div class="callButtons">
            <button class="circleBtn" onclick="muteT()">
                <svg viewBox="0 0 100 100" width="55">
                    <circle id="mCirc" cx="50" cy="50" r="42" fill="white" opacity="0.1"/>
                    <g fill="white"><rect x="44" y="30" width="12" height="22" rx="6" /><path d="M38 46 a12 12 0 0 0 24 0" fill="none" stroke="white" stroke-width="3"/></g>
                </svg>
            </button>

            <button id="callBtn" class="circleBtn" onclick="handleCall()">
                <svg class="phone-svg" viewBox="0 0 100 100" width="75">
                    <rect x="35" y="20" width="30" height="60" rx="6" fill="none" stroke="white" stroke-width="3"/>
                    <rect id="phoneScreen" x="39" y="25" width="22" height="42" rx="2" />
                    <circle cx="50" cy="72" r="3" fill="white"/>
                </svg>
                <div id="endCallText">END CALL</div>
            </button>

            <button class="circleBtn" onclick="openMod('fModal')">
                <svg viewBox="0 0 100 100" width="55"><circle cx="50" cy="50" r="42" fill="white" opacity="0.1"/><path d="M50 35v30M35 50h30" stroke="white" stroke-width="5" stroke-linecap="round"/></svg>
            </button>
        </div>

        <div style="margin-top: 30px; display: flex; align-items: center; gap: 20px; font-size: 10px; font-weight: 800; text-transform: uppercase;">
            <label style="cursor:pointer;"><input type="checkbox" id="autoCheck" onchange="toggleAuto()"> Auto Call</label>
            <span style="cursor:pointer; text-decoration:underline; opacity:0.7;" onclick="openMod('hModal')">History</span>
        </div>
    </div>
</div>

<div id="cModal" class="modal">
    <h3>Edit Canvas</h3>
    <div class="color-grid">
        <div class="color-opt" style="background:#FF6A88" onclick="setBg('#FF6A88')"></div>
        <div class="color-opt" style="background:#222" onclick="setBg('#222')"></div>
        <div class="color-opt" style="background:#4A90E2" onclick="setBg('#4A90E2')"></div>
        <div class="color-opt" style="background:linear-gradient(-45deg, #FF9A8B, #FF6A88, #FF99AC)" onclick="setBg('linear-gradient(-45deg, #FF9A8B, #FF6A88, #FF99AC)')"></div>
    </div>
    <button class="theme-btn" onclick="cls()">Done</button>
</div>

<div id="hModal" class="modal">
    <h3>Call History</h3>
    <div id="historyList" style="max-height:150px; overflow-y:auto; font-size:12px; margin:15px 0; text-align:left;"></div>
    <button class="theme-btn" onclick="cls()">Close</button>
</div>

<div id="fModal" class="modal">
    <h3>Add Friend?</h3>
    <div style="display:flex;gap:10px;margin-top:20px;"><button class="theme-btn" onclick="cls()" style="flex:1;background:#222;color:white;">No</button><button class="theme-btn" onclick="addFriend()" style="flex:1">Yes</button></div>
</div>

<script>
let peer = "";
let isAuto = false;
let history = [];

function toggleDD(id) { document.getElementById(id).classList.toggle('open'); }
function openMod(id) { document.getElementById(id).style.display='block'; }
function cls() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); }
function setBg(c) { document.body.style.background = c; document.body.style.animation = 'none'; cls(); }

function handleCall() {
    const btn = document.getElementById('callBtn');
    if (btn.classList.contains('connected')) endCall(); else startSearch();
}

function startSearch() {
    const btn = document.getElementById('callBtn');
    btn.classList.remove('connected');
    btn.classList.add('searching');
    document.getElementById('status').textContent = "Searching...";
    document.getElementById('endCallText').style.display = 'none';

    setTimeout(() => {
        if (!btn.classList.contains('searching')) return;
        btn.classList.remove('searching');
        btn.classList.add('connected');
        peer = "Guest_" + Math.floor(Math.random()*999);
        document.getElementById('status').textContent = "Connected: " + peer;
        document.getElementById('endCallText').style.display = 'block';
        history.push(peer);
        updateHistory();
        if(isAuto) setTimeout(() => { if(isAuto) endCall(); }, 5000);
    }, 2000);
}

function endCall() {
    const btn = document.getElementById('callBtn');
    btn.classList.remove('connected', 'searching');
    document.getElementById('status').textContent = "Ready";
    document.getElementById('endCallText').style.display = 'none';
    if (isAuto) setTimeout(startSearch, 1500);
}

function toggleAuto() {
    isAuto = document.getElementById('autoCheck').checked;
    if (isAuto && !document.getElementById('callBtn').classList.contains('connected')) startSearch();
}

function addFriend() {
    if(!peer) return cls();
    document.getElementById('connEmpty').style.display = 'none';
    const div = document.createElement('div');
    div.style.padding = "5px"; div.style.fontSize = "11px";
    div.textContent = "♥ " + peer;
    document.getElementById('connDD').appendChild(div);
    cls();
}

function updateHistory() {
    const list = document.getElementById('historyList');
    list.innerHTML = history.map(h => `<div style="padding:5px; border-bottom:1px solid #333;">${h}</div>`).join('');
}

function muteT() {
    let circ = document.getElementById('mCirc');
    circ.setAttribute('opacity', circ.getAttribute('opacity') === '0.1' ? '1' : '0.1');
}

function sendMsg() {
    let i = document.getElementById('msgInput');
    if(i.value) {
        let p = document.createElement('p'); p.textContent = i.value;
        let box = document.getElementById('messages');
        box.appendChild(p); i.value = ""; box.scrollTop = box.scrollHeight;
    }
}
</script>
</body>
</html>
