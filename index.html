<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LoveTalk ♥︎</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
/* ---------------- BASE ---------------- */
body{
    margin:0;
    font-family:'Inter',sans-serif;
    background: linear-gradient(-45deg,#FF9A8B,#FF6A88,#FF99AC);
    background-size:300% 300%;
    animation:gradientMove 12s ease infinite;
    color:white;
    display:flex;
    height:100vh;
    overflow:hidden;
}

@keyframes gradientMove{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

/* ---------------- LAYOUT ---------------- */
#leftPanel{
    width:420px;
    background:rgba(20,20,25,0.65);
    backdrop-filter:blur(20px);
    border-right:1px solid rgba(255,255,255,0.05);
    display:flex;
    flex-direction:column;
    padding:20px;
}

#centerPanel{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

/* ---------------- ONLINE ---------------- */
#onlineTop{
    display:flex;
    justify-content:space-between;
    font-weight:600;
    font-size:14px;
    cursor:pointer;
}

#onlineDropdown{
    max-height:0;
    overflow:hidden;
    transition:.3s;
}

#onlineDropdown.open{
    max-height:60vh;
    overflow-y:auto;
    margin-top:10px;
}

.dropdownUser{
    padding:8px;
    border-radius:8px;
    background:rgba(255,255,255,0.08);
    margin-bottom:6px;
}

/* ---------------- CHAT ---------------- */
#chatBox{
    margin-top:auto;
    display:flex;
    flex-direction:column;
    height:65%;
    border-radius:20px;
    background:rgba(255,255,255,0.06);
    padding:15px;
}

#messages{
    flex:1;
    overflow-y:auto;
}

#messages p{
    background:rgba(255,255,255,0.1);
    padding:12px;
    border-radius:18px;
    margin:8px 0;
}

#chatControls{
    display:flex;
    gap:10px;
    margin-top:10px;
}

#chatControls input{
    flex:1;
    padding:12px;
    border-radius:12px;
    border:none;
    background:#2b2c32;
    color:white;
}

#chatControls button{
    padding:12px 18px;
    border-radius:12px;
    border:none;
    background:white;
    font-weight:700;
}

/* ---------------- LOGO ---------------- */
#mainLogo{
    width:240px;
    transition:0.08s linear;
}

#brandName{
    font-size:2rem;
    font-weight:800;
    margin-top:15px;
}

.accent{ color:#222; }

#status{
    margin-top:8px;
    font-weight:600;
}

/* ---------------- CALL CONTROLS ---------------- */
#callControls{
    margin-top:20px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:12px;
}

.callButtons{
    display:flex;
    gap:15px;
    align-items:center;
}

.circleBtn{
    width:90px;
    height:90px;
    border:none;
    background:none;
    cursor:pointer;
}

.circleBtn svg{
    width:100%;
    height:100%;
}

#callLoader{
    width:90px;
    height:90px;
    border-radius:50%;
    border:6px solid rgba(255,255,255,0.3);
    border-top-color:white;
    animation:spin 1s linear infinite;
    display:none;
}

@keyframes spin{
    0%{transform:rotate(0deg)}
    100%{transform:rotate(360deg)}
}

.autoCallWrap{
    font-size:14px;
}
</style>
</head>

<body>

<!-- LEFT PANEL -->
<div id="leftPanel">

    <div id="onlineTop">
        <span id="onlineCount">People Online (0)</span>
        <span id="toggleUsers">▼</span>
    </div>

    <div id="onlineDropdown"></div>

    <div id="chatBox">
        <div id="messages"></div>
        <div id="chatControls">
            <input id="msgInput" placeholder="Say something...">
            <button id="sendBtn">Send</button>
        </div>
    </div>

</div>

<!-- CENTER PANEL -->
<div id="centerPanel">

<svg id="mainLogo" viewBox="0 0 100 100">
  <path fill="white" fill-rule="evenodd"
        d="M10 30 Q10 10 30 10 H70 Q90 10 90 30 V70 Q90 90 70 90 H30 Q10 90 10 70 Z
           M50 65 C35 50,30 40,40 35 C45 32,50 38,50 38 C50 38,55 32,60 35 C70 40,65 50,50 65Z"/>
  <polygon points="30,80 45,95 45,80" fill="white"/>
</svg>

<div id="brandName">Love<span class="accent">Talk</span></div>
<div id="status">Online</div>

<div id="callControls">
  <div class="callButtons">

    <!-- CALL BUTTON -->
    <button id="callBtn" class="circleBtn">
      <svg viewBox="0 0 100 100">
        <defs>
          <mask id="phoneMask">
            <rect width="100" height="100" fill="white"/>
            <path d="M35 40 Q45 30 55 40 L60 45 Q65 50 60 55 L55 60 Q50 65 45 60 L40 55 Q35 50 40 45 Z" fill="black"/>
          </mask>
        </defs>
        <circle cx="50" cy="50" r="40" fill="white" mask="url(#phoneMask)"/>
      </svg>
    </button>

    <div id="callLoader"></div>

    <!-- HANG BUTTON -->
    <button id="hangBtn" class="circleBtn" style="display:none;">
      <svg viewBox="0 0 100 100">
        <defs>
          <mask id="hangMask">
            <rect width="100" height="100" fill="white"/>
            <path d="M30 60 Q50 75 70 60 L65 55 Q50 65 35 55 Z" fill="black"/>
          </mask>
        </defs>
        <circle cx="50" cy="50" r="40" fill="white" mask="url(#hangMask)"/>
      </svg>
    </button>

  </div>

  <label class="autoCallWrap">
    <input type="checkbox" id="autoCall"> Auto Call
  </label>
</div>

</div>

<script>

/* ---------------- USERNAME ---------------- */
const adjectives=["Neo","Luxe","Echo","Nova","Drift","Vibe","Hyper","Aurora"];
const nouns=["Pulse","Flux","Wave","Core","Orbit","Phase","Glow","Shift"];

function generateUsername(){
  return adjectives[Math.floor(Math.random()*adjectives.length)]
       + nouns[Math.floor(Math.random()*nouns.length)]
       + Math.floor(Math.random()*900+100);
}

const username=generateUsername();

/* ---------------- WEBSOCKET ---------------- */
const ws = new WebSocket(`wss://${window.location.host}`);
let users=[];
let inCall=false;

ws.onopen=()=>ws.send(JSON.stringify({type:"join",username}));

ws.onmessage=e=>{
 const data=JSON.parse(e.data);

 if(data.type==="update"){
   users=data.users;
   updateOnlineUI();
 }

 if(data.type==="matched"){
   loader.style.display="none";
   hangBtn.style.display="block";
   inCall=true;
 }

 if(data.type==="callEnded"){
   resetCallUI();
 }
};

/* ---------------- ONLINE UI ---------------- */
const onlineDropdown=document.getElementById("onlineDropdown");
const onlineCount=document.getElementById("onlineCount");
const toggleUsers=document.getElementById("toggleUsers");

function updateOnlineUI(){
 onlineDropdown.innerHTML="";
 users.forEach(u=>{
   const div=document.createElement("div");
   div.className="dropdownUser";
   div.textContent=u;
   onlineDropdown.appendChild(div);
 });
 onlineCount.textContent=`People Online (${users.length})`;
}

toggleUsers.onclick=()=>{
 onlineDropdown.classList.toggle("open");
};

/* ---------------- CALL SYSTEM ---------------- */
const callBtn=document.getElementById("callBtn");
const hangBtn=document.getElementById("hangBtn");
const loader=document.getElementById("callLoader");

callBtn.onclick=()=>{
 callBtn.style.display="none";
 loader.style.display="block";
 ws.send(JSON.stringify({type:"call"}));
};

hangBtn.onclick=()=>{
 ws.send(JSON.stringify({type:"hangup"}));
 resetCallUI();
};

function resetCallUI(){
 loader.style.display="none";
 hangBtn.style.display="none";
 callBtn.style.display="block";
 inCall=false;
}

/* ---------------- LOGO MIC PULSE ---------------- */
navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
 const ctx=new (window.AudioContext||window.webkitAudioContext)();
 const analyser=ctx.createAnalyser();
 const mic=ctx.createMediaStreamSource(stream);
 mic.connect(analyser);
 analyser.fftSize=256;
 const dataArray=new Uint8Array(analyser.frequencyBinCount);
 const logo=document.getElementById("mainLogo");

 function animate(){
   analyser.getByteFrequencyData(dataArray);
   const avg=dataArray.reduce((a,b)=>a+b)/dataArray.length;
   logo.style.transform=`scale(${1+avg/200})`;
   requestAnimationFrame(animate);
 }
 animate();
});

</script>

</body>
</html>
