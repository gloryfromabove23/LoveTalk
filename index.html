<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LoveTalk ♥︎</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root { --main-bg: linear-gradient(-45deg, #FF9A8B, #FF6A88, #FF99AC); --logo-dash: 400; --heart-fill: 0; }
body { margin: 0; font-family: 'Inter', sans-serif; background: var(--main-bg); background-size: 300% 300%; animation: grad 12s ease infinite; color: white; overflow-x: hidden; }
@keyframes grad { 0% { background-position: 0% 50% } 50% { background-position: 100% 50% } 100% { background-position: 0% 50% } }

#topBar { padding: 15px 30px; display: flex; justify-content: flex-end; background: rgba(0,0,0,0.1); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 1000; }
.theme-btn { background: white; color: black; border: none; padding: 8px 16px; border-radius: 20px; font-weight: 700; cursor: pointer; font-size: 10px; text-transform: uppercase; }

#appView { display: flex; height: 90vh; width: 100%; transition: all 0.3s ease; }
#leftPanel { width: 400px; background: rgba(15, 15, 20, 0.9); backdrop-filter: blur(20px); border-right: 1px solid rgba(255, 255, 255, 0.1); display: flex; flex-direction: column; padding: 20px; flex-shrink: 0; }
#centerPanel { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; transition: all 0.3s ease; }

/* Logo: Cutout heart with green outline tracing */
#logoWrapper { display: flex; flex-direction: column; align-items: center; gap: 10px; }
#logoContainer { width: 180px; height: 180px; position: relative; }
.base-bubble { fill: white; }
.outline-trace { fill: none; stroke: #4BFF8B; stroke-width: 3; stroke-linecap: round; stroke-dasharray: 400; stroke-dashoffset: var(--logo-dash); transition: stroke-dashoffset 0.1s linear; }
.heart-cutout { fill: #4BFF8B; opacity: var(--heart-fill); transition: opacity 0.2s; }

#brandName { font-size: 3.5rem; font-weight: 800; margin: 0; letter-spacing: -3px; }
#status { font-weight: 600; opacity: 0.7; letter-spacing: 2px; text-transform: uppercase; font-size: 9px; margin-bottom: 40px; }

.callButtons { display: flex; flex-direction: row; gap: 20px; align-items: center; }
.circleBtn { width: 80px; height: 80px; border: none; background: transparent; cursor: pointer; position: relative; display: flex; align-items: center; justify-content: center; }

#muteHighlight { display: none; position: absolute; width: 60px; height: 60px; background: #FF4B4B; border-radius: 50%; z-index: -1; }
#muteText, #endCallText { position: absolute; bottom: -5px; font-size: 10px; font-weight: 900; color: #FF4B4B; background: #fff; padding: 2px 8px; border-radius: 4px; display: none; white-space: nowrap; z-index: 5; }

/* Fixed distance for Auto & History */
.bottom-controls { margin-top: 30px; display: flex; gap: 40px; font-size: 10px; font-weight: 800; text-transform: uppercase; align-items: center; }

@media (max-width: 850px) {
    #appView { flex-direction: column; height: auto; }
    #leftPanel { width: 100%; height: 500px; border-right: none; }
    #logoWrapper { flex-direction: row; justify-content: center; margin-bottom: 20px; }
    #logoContainer { width: 60px; height: 60px; }
    #brandName { font-size: 2rem; }
    #footerSpace, footer { display: none; } /* Hidden on small screens unless scrolled */
}

#chatBox { margin-top: 15px; display: flex; flex-direction: column; flex-grow: 1; background: rgba(0, 0, 0, 0.3); border-radius: 15px; padding: 15px; overflow: hidden; }
#messages { flex: 1; overflow-y: auto; font-size: 14px; display: flex; flex-direction: column; gap: 8px; }
.msg-bubble { background: rgba(255,255,255,0.1); padding: 10px; border-radius: 12px; max-width: 90%; align-self: flex-start; }
.msg-bubble.mine { align-self: flex-end; background: rgba(75, 255, 139, 0.2); }
.msg-bubble img { max-width: 100%; border-radius: 8px; display: block; }

#footerSpace { margin-top: 500px; padding: 80px 15%; text-align: center; background: white; color: #333; }
footer { padding: 40px; text-align: center; font-size: 10px; background: #0b0b0d; color: #555; font-weight: 800; }

.modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 320px; background: #111; border-radius: 20px; padding: 25px; z-index: 2000; text-align: center; border: 1px solid #333; }
#memeGrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-height: 400px; overflow-y: auto; margin: 15px 0; padding: 5px; }
.meme-thumb { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 5px; cursor: pointer; border: 2px solid transparent; }
.meme-thumb:hover { border-color: #4BFF8B; }

#connDD { font-size: 11px; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 10px; margin-top: 5px; }
</style>
</head>
<body>

<div id="topBar"><button class="theme-btn" onclick="openMod('cModal')">Edit Canvas</button></div>

<div id="appView">
    <div id="leftPanel">
        <div style="font-size:10px; font-weight:800; border-bottom:1px solid rgba(255,255,255,0.1); padding:10px 0; display:flex; justify-content: space-between;">
            <span>VERIFIED HUMANS</span> <span id="onlineCount">142</span>
        </div>
        
        <div id="connDD">
            <div id="connEmpty" style="opacity:0.3;">No active connections</div>
        </div>
        
        <div id="chatBox">
            <div id="messages"></div>
            <div style="display:flex; gap:8px; margin-top:10px;">
                <input id="msgInput" onkeydown="if(event.key==='Enter')sendMsg()" style="flex:1; background:rgba(255,255,255,0.1); border:none; color:white; padding:10px; border-radius:10px; outline:none;" placeholder="Type...">
                <button onclick="fetchMemes()" style="background:transparent; border:1px solid #4BFF8B; border-radius:10px; padding:0 10px; cursor:pointer; font-size:18px;">🎲</button>
                <button onclick="sendMsg()" style="background:#fff; color:#000; border:none; border-radius:10px; padding:0 15px; cursor:pointer; font-weight:800; font-size:10px;">SEND</button>
            </div>
        </div>
    </div>

    <div id="centerPanel">
        <div id="logoWrapper">
            <div id="logoContainer">
                <svg viewBox="0 0 100 100" class="bubble-svg">
                    <defs>
                        <mask id="m">
                            <rect width="100" height="100" fill="white"/>
                            <path d="M50 65 C45 60 30 55 30 42 A12 12 0 0 1 50 35 A12 12 0 0 1 70 42 C70 55 55 60 50 65" fill="black"/>
                        </mask>
                    </defs>
                    <path class="base-bubble" d="M20 15 H80 Q88 15 88 23 V68 Q88 76 80 76 H45 L30 90 V76 Q12 76 12 68 V23 Q12 15 20 15 Z" mask="url(#m)"/>
                    <path class="outline-trace" d="M20 15 H80 Q88 15 88 23 V68 Q88 76 80 76 H45 L30 90 V76 Q12 76 12 68 V23 Q12 15 20 15 Z"/>
                    <path class="heart-cutout" d="M50 65 C45 60 30 55 30 42 A12 12 0 0 1 50 35 A12 12 0 0 1 70 42 C70 55 55 60 50 65"/>
                </svg>
            </div>
            <div id="brandName">Love<span style="font-weight:100">Talk</span></div>
        </div>
        
        <div id="status">Ready</div>
        
        <div class="callButtons">
            <button class="circleBtn" onclick="muteT()">
                <div id="muteHighlight"></div>
                <svg viewBox="0 0 100 100" width="55"><circle cx="50" cy="50" r="42" fill="white" opacity="0.1"/><g fill="white"><rect x="44" y="30" width="12" height="22" rx="6" /><path d="M38 46 a12 12 0 0 0 24 0" fill="none" stroke="white" stroke-width="4"/></g></svg>
                <div id="muteText">MUTED</div>
            </button>
            <button id="callBtn" class="circleBtn" onclick="handleCall()">
                <svg viewBox="0 0 100 100" width="75"><rect x="35" y="20" width="30" height="60" rx="6" fill="none" stroke="white" stroke-width="3"/><rect id="phoneScreen" x="39" y="25" width="22" height="42" rx="2" fill="#4BFF8B"/><circle cx="50" cy="72" r="3" fill="white"/></svg>
                <div id="endCallText">END CALL</div>
            </button>
            <button class="circleBtn" onclick="openMod('fModal')"><svg viewBox="0 0 100 100" width="55"><circle cx="50" cy="50" r="42" fill="white" opacity="0.1"/><path d="M50 30 v40 M30 50 h40" stroke="white" stroke-width="8" stroke-linecap="round"/></svg></button>
            <button class="circleBtn" onclick="openMod('bModal')"><svg viewBox="0 0 100 100" width="55"><circle cx="50" cy="50" r="42" fill="white" opacity="0.1"/><text x="50" y="65" text-anchor="middle" fill="white" font-size="45" font-weight="800">!</text></svg></button>
        </div>

        <div class="bottom-controls">
            <label style="cursor:pointer;"><input type="checkbox" id="autoCheck" onchange="toggleAuto()"> Auto Call</label>
            <span style="cursor:pointer; text-decoration:underline; opacity:0.6;" onclick="openMod('hModal')">History</span>
        </div>
    </div>
</div>

<div id="footerSpace"><h2>The Mission</h2><p>LoveTalk connects humans directly. Pure conversation. No tracking.</p></div>
<footer>&copy; 2026 LOVETALK NETWORKS // ENCRYPTED</footer>

<div id="memeModal" class="modal">
    <h3>Meme Gallery</h3>
    <div id="memeGrid"></div>
    <button class="theme-btn" onclick="cls()">Cancel</button>
</div>

<div id="bModal" class="modal">
    <h3 style="color:#FF4B4B">Report User</h3>
    <input type="text" id="banReason" style="width:85%; padding:10px; margin:10px 0; background:#222; border:none; color:#fff;" placeholder="Reason...">
    <div style="display:flex;gap:10px;"><button class="theme-btn" onclick="cls()" style="flex:1">Cancel</button><button class="theme-btn" onclick="confirmBan()" style="flex:1;background:#FF4B4B;color:white;">Confirm</button></div>
</div>

<div id="fModal" class="modal">
    <h3>Add to Connections?</h3>
    <div style="display:flex;gap:10px;"><button class="theme-btn" onclick="cls()" style="flex:1">No</button><button class="theme-btn" onclick="addFriend()" style="flex:1;background:#4BFF8B;">Yes</button></div>
</div>

<div id="hModal" class="modal">
    <h3>Recent Humans</h3>
    <div id="historyList" style="max-height:150px; overflow-y:auto; text-align:left; font-size:11px;"></div>
    <button class="theme-btn" onclick="cls()" style="margin-top:10px">Close</button>
</div>

<div id="cModal" class="modal">
    <h3>Canvas</h3>
    <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:10px; margin:15px 0;">
        <div style="height:35px; border-radius:5px; background:linear-gradient(-45deg, #FF9A8B, #FF6A88, #FF99AC); cursor:pointer;" onclick="setBg('linear-gradient(-45deg, #FF9A8B, #FF6A88, #FF99AC)')"></div>
        <div style="height:35px; border-radius:5px; background:#001a33; cursor:pointer;" onclick="setBg('#001a33')"></div>
        <div style="height:35px; border-radius:5px; background:#1a1a1a; cursor:pointer;" onclick="setBg('#1a1a1a')"></div>
    </div>
    <button class="theme-btn" onclick="cls()">Done</button>
</div>

<script>
let peer = "";
let isAuto = false;
let history = [];
let audioContext, analyser, dataArray;

function openMod(id) { document.getElementById(id).style.display='block'; }
function cls() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); }
function setBg(c) { document.body.style.background = c; document.body.style.animation = 'none'; cls(); }

async function fetchMemes() {
    openMod('memeModal');
    const grid = document.getElementById('memeGrid');
    grid.innerHTML = "Loading 60 memes...";
    try {
        const res = await fetch('https://api.imgflip.com/get_memes');
        const data = await res.json();
        // Requesting 60 memes
        const memes = data.data.memes.slice(0, 60);
        grid.innerHTML = memes.map(m => `<img src="${m.url}" class="meme-thumb" onclick="sendMeme('${m.url}')">`).join('');
    } catch(e) { grid.innerHTML = "Failed to load memes."; }
}

function sendMeme(url) {
    const div = document.createElement('div');
    div.className = "msg-bubble mine";
    div.innerHTML = `<img src="${url}">`;
    document.getElementById('messages').appendChild(div);
    cls();
    const m = document.getElementById('messages'); m.scrollTop = m.scrollHeight;
}

function handleCall() {
    const btn = document.getElementById('callBtn');
    if (btn.classList.contains('connected')) endCall(); else startSearch();
}

function startSearch() {
    const btn = document.getElementById('callBtn');
    btn.classList.add('searching');
    document.getElementById('status').textContent = "Locating Human...";
    
    // Auto-connect without human verification screen
    setTimeout(() => {
        btn.classList.remove('searching');
        btn.classList.add('connected');
        peer = "Human_" + Math.floor(Math.random()*999);
        document.getElementById('status').textContent = "Linked: " + peer;
        document.getElementById('endCallText').style.display = 'block';
        document.getElementById('phoneScreen').style.fill = "#FF4B4B"; 
        history.push(peer);
        updateHistory();
        initAudio();
    }, 1500);
}

function endCall() {
    const btn = document.getElementById('callBtn');
    btn.classList.remove('connected', 'searching');
    document.getElementById('status').textContent = "Ready";
    document.getElementById('endCallText').style.display = 'none';
    document.getElementById('phoneScreen').style.fill = "#4BFF8B";
    document.documentElement.style.setProperty('--logo-dash', '400');
    document.documentElement.style.setProperty('--heart-fill', '0');
    peer = "";
}

function addFriend() {
    if(!peer) return alert("Connect to a human first!");
    document.getElementById('connEmpty').style.display = 'none';
    const div = document.createElement('div');
    div.style.color = "#4BFF8B";
    div.style.marginBottom = "5px";
    div.textContent = "♥ " + peer;
    document.getElementById('connDD').appendChild(div);
    cls();
}

function confirmBan() {
    if(!peer) return cls();
    alert("User " + peer + " has been reported and disconnected.");
    endCall();
    cls();
}

function sendMsg() {
    let i = document.getElementById('msgInput');
    if(i.value) {
        let div = document.createElement('div'); 
        div.className = "msg-bubble mine";
        div.textContent = i.value;
        document.getElementById('messages').appendChild(div);
        i.value = "";
        const m = document.getElementById('messages'); m.scrollTop = m.scrollHeight;
    }
}

async function initAudio() {
    if(audioContext) return;
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioContext.createAnalyser();
        const source = audioContext.createMediaStreamSource(stream);
        source.connect(analyser);
        analyser.fftSize = 256;
        dataArray = new Uint8Array(analyser.frequencyBinCount);
        processHeartLogic();
    } catch(e) { console.warn("Mic access denied"); }
}

function processHeartLogic() {
    if(!analyser || !document.getElementById('callBtn').classList.contains('connected')) return;
    requestAnimationFrame(processHeartLogic);
    analyser.getByteFrequencyData(dataArray);
    let volume = dataArray.reduce((a,b) => a+b) / dataArray.length;
    
    // Trace outline: 400 is full dash (invisible), 0 is full stroke
    let dashOffset = Math.max(0, 400 - (volume * 4));
    document.documentElement.style.setProperty('--logo-dash', dashOffset);
    
    // Fill the cutout heart when volume is high
    document.documentElement.style.setProperty('--heart-fill', volume > 25 ? '1' : '0');
}

function updateHistory() {
    const list = document.getElementById('historyList');
    list.innerHTML = history.slice().reverse().map(h => `<div style="padding:8px; border-bottom:1px solid #333;">${h}</div>`).join('');
}

function muteT() {
    const high = document.getElementById('muteHighlight');
    const isMuted = high.style.display === 'block';
    high.style.display = isMuted ? 'none' : 'block';
    document.getElementById('muteText').style.display = isMuted ? 'none' : 'block';
}

function toggleAuto() { isAuto = document.getElementById('autoCheck').checked; }
</script>
</body>
</html>
