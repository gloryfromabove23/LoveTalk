<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoveTalk ♥︎ | Connection Reimagined</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
:root { 
    --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    --glass: rgba(255, 255, 255, 0.1);
    --glass-heavy: rgba(255, 255, 255, 0.2);
    --glass-border: rgba(255, 255, 255, 0.15);
    --accent: #00f2fe;
    --heart-pink: #ff5e78;
    --apple-blue: #007aff;
    --danger: #ff3b30;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }

body { 
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg-gradient);
    background-attachment: fixed;
    color: white;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* NAVIGATION */
header {
    height: 70px;
    padding: 0 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(0, 0, 0, 0.2);
    backdrop-filter: blur(25px);
    border-bottom: 1px solid var(--glass-border);
    z-index: 1000;
}

.brand-unit { display: flex; align-items: center; gap: 12px; cursor: pointer; transition: 0.3s; }
.brand-unit:hover { transform: scale(1.02); }
.logo-svg { width: 38px; height: 38px; filter: drop-shadow(0 0 8px var(--heart-pink)); }
.brand-name { font-weight: 800; font-size: 24px; letter-spacing: -1.5px; }

.user-status {
    background: var(--glass);
    padding: 8px 16px;
    border-radius: 30px;
    border: 1px solid var(--glass-border);
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
    font-weight: 600;
}
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 10px var(--accent); }

/* MAIN CONTAINER */
#mainApp { display: flex; flex: 1; height: calc(100vh - 70px); overflow: hidden; }

/* LEFT PANEL (CHAT) */
#chatPanel {
    flex: 1.2;
    display: flex;
    flex-direction: column;
    padding: 20px;
    border-right: 1px solid var(--glass-border);
}

.chat-box {
    flex: 1;
    background: #ffffff;
    border-radius: 28px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}

.chat-header {
    padding: 15px;
    text-align: center;
    background: #fbfbfd;
    border-bottom: 1px solid #efeff4;
    color: #1d1d1f;
    font-weight: 700;
    font-size: 14px;
}

#messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    background: #fff;
}

/* iMessage Bubbles */
.msg { max-width: 75%; display: flex; flex-direction: column; }
.msg.mine { align-self: flex-end; align-items: flex-end; }
.msg.other { align-self: flex-start; align-items: flex-start; }

.bubble { padding: 12px 18px; border-radius: 22px; font-size: 15px; line-height: 1.4; position: relative; }
.msg.mine .bubble { background: var(--apple-blue); color: white; border-bottom-right-radius: 5px; }
.msg.other .bubble { background: #e9e9eb; color: black; border-bottom-left-radius: 5px; }

.chat-footer { padding: 15px; background: #fff; border-top: 1px solid #efeff4; }
.input-area { display: flex; align-items: center; gap: 10px; background: #f2f2f7; padding: 6px 15px; border-radius: 40px; }
.input-area input { flex: 1; border: none; background: transparent; padding: 10px; outline: none; font-size: 15px; }

/* MEME DRAWER */
#memeTray {
    display: none;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    padding: 15px;
    background: #f2f2f7;
    max-height: 250px;
    overflow-y: auto;
    border-top: 1px solid #ddd;
}
.meme-thumb { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 10px; cursor: pointer; transition: 0.2s; }
.meme-thumb:hover { transform: scale(1.05); }

/* RIGHT PANEL (CONTROLS) */
#hubPanel {
    flex: 0.8;
    padding: 30px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 40px;
}

.stats-grid { width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.stat-card {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(10px);
    border-radius: 24px;
    padding: 20px;
    height: 180px;
}
.stat-card h4 { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; color: var(--accent); }

.call-ui { text-align: center; }
.status-tag { font-size: 48px; font-weight: 800; margin-bottom: 10px; letter-spacing: -2px; }

.control-buttons { display: flex; gap: 20px; align-items: center; }
.action-btn {
    width: 65px; height: 65px; border-radius: 50%; border: 1px solid var(--glass-border);
    background: var(--glass); color: white; cursor: pointer; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    display: flex; align-items: center; justify-content: center; position: relative;
}
.action-btn:hover { background: var(--glass-heavy); transform: scale(1.1); }
.action-btn.primary { width: 90px; height: 90px; background: var(--accent); border: none; color: #121212; }
.action-btn.danger { color: var(--danger); }
.action-btn svg { width: 28px; height: 28px; fill: currentColor; }

.btn-tip { position: absolute; bottom: -25px; font-size: 9px; font-weight: 800; white-space: nowrap; }

/* MODALS */
#sideNav {
    position: fixed; right: -400px; top: 0; width: 380px; height: 100vh;
    background: rgba(18, 18, 18, 0.95); backdrop-filter: blur(20px);
    z-index: 2000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    padding: 40px; border-left: 1px solid var(--glass-border);
}
#sideNav.open { right: 0; }

.user-row { padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; cursor: pointer; }
.user-row:hover { color: var(--accent); }

@media (max-width: 900px) {
    #mainApp { flex-direction: column; overflow-y: auto; }
    #chatPanel, #hubPanel { flex: none; width: 100%; }
    #chatPanel { height: 600px; }
}
</style>
</head>
<body>

<header>
    <div class="brand-unit">
        <svg class="logo-svg" viewBox="0 0 24 24">
            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="var(--heart-pink)"/>
            <path d="M8 8h8v2H8V8zm0 4h5v2H8v-2z" fill="white" opacity="0.8"/>
        </svg>
        <div class="brand-name">LoveTalk</div>
    </div>
    <div style="display: flex; gap: 15px; align-items: center;">
        <div class="user-status">
            <span class="status-dot"></span>
            <span id="userName">Verifying...</span>
        </div>
        <button onclick="toggleSide()" style="background:white; color:black; border:none; padding:8px 18px; border-radius:20px; font-size:11px; font-weight:800; cursor:pointer;">HISTORY</button>
    </div>
</header>

<div id="mainApp">
    <section id="chatPanel">
        <div class="chat-box">
            <div class="chat-header" id="chatTitle">READY TO CONNECT</div>
            <div id="messages">
                <div style="margin: auto; text-align: center; max-width: 250px;">
                    <p style="color: #8e8e93; font-size: 13px;">Your messages are private and end-to-end encrypted.</p>
                </div>
            </div>
            <div id="memeTray"></div>
            <div class="chat-footer">
                <div class="input-area">
                    <button onclick="toggleMemes()" style="background:none; border:none; font-size:20px; cursor:pointer;">🤡</button>
                    <input type="text" id="msgInput" placeholder="Send a message..." onkeydown="if(event.key==='Enter')sendMsg()">
                    <button onclick="sendMsg()" style="background:var(--apple-blue); border:none; color:white; width:34px; height:34px; border-radius:50%; font-weight:800; cursor:pointer;">↑</button>
                </div>
            </div>
        </div>
    </section>

    <section id="hubPanel">
        <div class="stats-grid">
            <div class="stat-card">
                <h4>Verified Online</h4>
                <div id="onlineList"></div>
            </div>
            <div class="stat-card">
                <h4>Soulmates</h4>
                <div id="favList"></div>
            </div>
        </div>

        <div class="call-ui">
            <h1 class="status-tag" id="mainStatus">READY</h1>
            <p style="opacity:0.6; font-size:14px;">Find someone to talk to instantly</p>
        </div>

        <div class="control-buttons">
            <button class="action-btn danger" onclick="report()">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
                <span class="btn-tip">REPORT</span>
            </button>

            <button class="action-btn primary" onclick="handleCall()" id="callBtn">
                <svg viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
                <span class="btn-tip" style="color:white; bottom:-30px;">START CALL</span>
            </button>

            <button class="action-btn" onclick="addFav()">
                <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                <span class="btn-tip">FAVORITE</span>
            </button>
        </div>

        <div style="font-size: 12px; display: flex; align-items: center; gap: 10px;">
            <input type="checkbox" id="autoNext" style="accent-color: var(--accent);">
            <label for="autoNext" style="opacity:0.8; cursor:pointer;">Auto-connect to next person</label>
        </div>
    </section>
</div>

<div id="sideNav">
    <div onclick="toggleSide()" style="cursor:pointer; font-size:12px; opacity:0.5; margin-bottom:30px;">✕ CLOSE HISTORY</div>
    <h2 style="margin-bottom:20px; font-weight:800;">Recent Encounters</h2>
    <div id="historyList"></div>
</div>

<script>
let currentPeer = null;
let favorites = JSON.parse(localStorage.getItem('lt_favs') || '[]');
const rFirst = ["Spark", "Velvet", "Midnight", "Ember", "Ocean", "Rose", "Golden", "Silk", "Neon", "Lunar"];
const rLast = ["Soul", "Whisper", "Vibe", "Flame", "Baker", "Dream", "Hunter", "Starlight", "Petal", "Aura"];

function init() {
    let name = localStorage.getItem('lt_username');
    if(!name) {
        name = rFirst[Math.floor(Math.random()*rFirst.length)] + rLast[Math.floor(Math.random()*rLast.length)] + (Math.floor(Math.random()*90)+10);
        localStorage.setItem('lt_username', name);
    }
    document.getElementById('userName').innerText = name;
    
    renderFavs();
    generateOnline();
    loadMemes();
}

function handleCall() {
    if(currentPeer) endCall();
    else findMatch();
}

function findMatch() {
    const btn = document.getElementById('callBtn');
    document.getElementById('mainStatus').innerText = "LINKING...";
    btn.style.background = "var(--danger)";
    
    setTimeout(() => {
        currentPeer = rFirst[Math.floor(Math.random()*rFirst.length)] + rLast[Math.floor(Math.random()*rLast.length)];
        document.getElementById('mainStatus').innerText = "CONNECTED";
        document.getElementById('chatTitle').innerText = "CHAT WITH " + currentPeer.toUpperCase();
        addMsg(`Connected with ${currentPeer}. Say hello!`, 'system');
        logEntry(currentPeer);
    }, 1500);
}

function endCall() {
    currentPeer = null;
    document.getElementById('mainStatus').innerText = "READY";
    document.getElementById('chatTitle').innerText = "READY TO CONNECT";
    document.getElementById('callBtn').style.background = "var(--accent)";
    addMsg("Call ended.", "system");
    
    if(document.getElementById('autoNext').checked) {
        setTimeout(findMatch, 1000);
    }
}

function sendMsg() {
    const input = document.getElementById('msgInput');
    if(!input.value.trim() || !currentPeer) return;
    addMsg(input.value, 'mine');
    input.value = "";
    
    // Bot Mock Response
    setTimeout(() => {
        if(currentPeer) addMsg("That's really interesting, tell me more!", 'other');
    }, 1500);
}

function addMsg(text, type) {
    const box = document.getElementById('messages');
    const wrap = document.createElement('div');
    wrap.className = type === 'system' ? 'system-msg' : 'msg ' + type;
    
    if(type === 'system') {
        wrap.innerHTML = `<div style="text-align:center; font-size:11px; color:#aaa; margin:10px 0;">${text}</div>`;
    } else {
        wrap.innerHTML = `<div class="bubble">${text}</div>`;
    }
    
    box.appendChild(wrap);
    box.scrollTop = box.scrollHeight;
}

function toggleMemes() {
    const tray = document.getElementById('memeTray');
    tray.style.display = tray.style.display === 'grid' ? 'none' : 'grid';
}

async function loadMemes() {
    const tray = document.getElementById('memeTray');
    try {
        const res = await fetch('https://api.imgflip.com/get_memes');
        const data = await res.json();
        const memes = data.data.memes.slice(0, 60);
        tray.innerHTML = memes.map(m => `<img src="${m.url}" class="meme-thumb" onclick="sendMeme('${m.url}')">`).join('');
    } catch(e) { tray.innerText = "Failed to load memes."; }
}

function sendMeme(url) {
    if(!currentPeer) return;
    addMsg(`<img src="${url}" style="width:100%; border-radius:10px;">`, 'mine');
    toggleMemes();
}

function logEntry(name) {
    const list = document.getElementById('historyList');
    const div = document.createElement('div');
    div.className = "user-row";
    div.innerHTML = `<span>${name}</span> <span style="float:right; opacity:0.4">${new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>`;
    list.prepend(div);
}

function addFav() {
    if(!currentPeer || favorites.includes(currentPeer)) return;
    favorites.push(currentPeer);
    localStorage.setItem('lt_favs', JSON.stringify(favorites));
    renderFavs();
}

function renderFavs() {
    const list = document.getElementById('favList');
    list.innerHTML = favorites.map(f => `<div class="user-row">♥ ${f}</div>`).join('');
}

function report() {
    if(!currentPeer) return;
    alert("User reported. Severing connection.");
    endCall();
}

function generateOnline() {
    const list = document.getElementById('onlineList');
    for(let i=0; i<5; i++) {
        let name = rFirst[Math.floor(Math.random()*rFirst.length)] + rLast[Math.floor(Math.random()*rLast.length)];
        list.innerHTML += `<div class="user-row">🟢 ${name}</div>`;
    }
}

function toggleSide() { document.getElementById('sideNav').classList.toggle('open'); }

init();
</script>
</body>
</html>
