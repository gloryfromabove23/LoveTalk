<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LoveTalk 💖</title>
<link href="https://fonts.googleapis.com/css2?family=Bubblegum+Sans&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Bubblegum Sans', cursive;
    background:#491121;
    display:flex;
    flex-direction:column;
    align-items:center;
    height:100vh;
    overflow:hidden;
    color:white;
}

/* ---------------- CENTER LOGO SECTION ---------------- */
#centerSection{
    position:relative;
    margin-top:80px;
    text-align:center;
    transition: all 0.5s ease;
}

#logo{
    width:180px;
}

#voiceButtons{
    margin-top:20px;
    display:flex;
    gap:20px;
    justify-content:center;
    transition: all 0.5s ease;
}

#voiceButtons button{
    padding:15px 30px;
    border-radius:15px;
    border:none;
    font-size:1.1rem;
    background:linear-gradient(45deg,#f7d68f,#fff7cc);
    color:#491121;
    cursor:pointer;
    box-shadow:0 0 15px #f7d68f88;
    transition:0.3s;
}

#voiceButtons button:hover{
    box-shadow:0 0 25px #f7d68f,0 0 50px #f7d68f;
    transform:scale(1.05);
}

/* ---------------- ONLINE STATUS ---------------- */
#myStatus{
    margin-top:15px;
    font-size:1rem;
}

.statusDot{
    display:inline-block;
    width:10px;
    height:10px;
    border-radius:50%;
    margin-right:6px;
}

.online{ background:#4caf50; }
.offline{ background:#ff4c4c; }

/* ---------------- CHAT ICON ---------------- */
#chatIcon{
    position:absolute;
    right:-120px;
    top:0;
    width:60px;
    height:60px;
    background:#f7d68f;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    font-size:24px;
    color:#491121;
    box-shadow:0 0 20px #f7d68f;
    transition:0.4s;
}

#chatIcon:hover{
    box-shadow:0 0 35px #f7d68f,0 0 60px #f7d68f;
}

/* ---------------- CHAT PANEL ---------------- */
#chatPanel{
    position:absolute;
    right:-450px;
    top:0;
    width:400px;
    height:500px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
    border-radius:20px;
    display:flex;
    flex-direction:column;
    padding:15px;
    transition:0.5s;
}

#chatPanel.open{
    right:-20px;
}

#messages{
    flex:1;
    overflow-y:auto;
    border:1px solid #f7d68f;
    border-radius:10px;
    padding:10px;
}

#chatControls{
    display:flex;
    gap:10px;
    margin-top:10px;
}

#chatControls input{
    flex:1;
    padding:8px;
    border-radius:8px;
    border:none;
    background:rgba(255,255,255,0.2);
    color:white;
}

#chatControls button{
    padding:8px 12px;
    border-radius:8px;
    border:none;
    background:#f7d68f;
    color:#491121;
    cursor:pointer;
}

/* when chat opens move buttons */
.chatOpen #voiceButtons{
    transform:translateY(-40px);
}
</style>
</head>

<body>

<div id="centerSection">

    <img id="logo" src="YOUR_LOGO_URL_HERE.png">

    <div id="voiceButtons">
        <button id="newChat">🔄 New</button>
        <button id="leaveChat">❌ Leave</button>
    </div>

    <div id="myStatus">
        <span id="statusDot" class="statusDot online"></span>
        <span id="statusText">Online</span>
    </div>

    <div id="chatIcon">💬</div>

    <div id="chatPanel">
        <div id="messages"></div>
        <div id="chatControls">
            <input id="msgInput" placeholder="Type message...">
            <button id="sendBtn">Send</button>
        </div>
    </div>

</div>

<script>
const chatIcon = document.getElementById("chatIcon");
const chatPanel = document.getElementById("chatPanel");
const body = document.body;

chatIcon.onclick = () => {
    chatPanel.classList.toggle("open");
    body.classList.toggle("chatOpen");
};

/* ---------------- TAB ONLINE / OFFLINE ---------------- */
const statusDot = document.getElementById("statusDot");
const statusText = document.getElementById("statusText");

function updateStatus(){
    if(document.hidden){
        statusDot.className="statusDot offline";
        statusText.textContent="Offline";
    } else {
        statusDot.className="statusDot online";
        statusText.textContent="Online";
    }
}

document.addEventListener("visibilitychange", updateStatus);
updateStatus();

/* ---------------- CHAT DEMO ---------------- */
const sendBtn = document.getElementById("sendBtn");
const msgInput = document.getElementById("msgInput");
const messages = document.getElementById("messages");

sendBtn.onclick = ()=>{
    if(msgInput.value.trim()){
        const p=document.createElement("p");
        p.textContent=msgInput.value;
        messages.appendChild(p);
        msgInput.value="";
        messages.scrollTop=messages.scrollHeight;
    }
};
</script>

</body>
</html>
