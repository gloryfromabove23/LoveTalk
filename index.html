<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LoveTalk ♥︎</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;400;600;800&display=swap" rel="stylesheet">
<script src="/socket.io/socket.io.js"></script>

<style>
/* ---------------- BASE ---------------- */
body {
    margin: 0; font-family: 'Inter', sans-serif;
    background: linear-gradient(-45deg, #FF9A8B, #FF6A88, #FF99AC);
    background-size: 300% 300%; animation: gradientMove 12s ease infinite;
    color: white; display: flex; height: 100vh; overflow: hidden;
}
@keyframes gradientMove { 0% { background-position: 0% 50% } 50% { background-position: 100% 50% } 100% { background-position: 0% 50% } }

/* ---------------- LAYOUT ---------------- */
#leftPanel {
    width: 320px; min-width: 280px; max-width: 35vw;
    background: rgba(20, 20, 25, 0.7); backdrop-filter: blur(20px);
    border-right: 1px solid rgba(255, 255, 255, 0.1);
    display: flex; flex-direction: column; padding: 20px; z-index: 10;
}
#centerPanel {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
}

/* ---------------- BRANDING & LOGO ---------------- */
#mainLogo { 
    width: 150px; /* Made bigger */
    height: 150px; 
    margin-bottom: 20px; 
    transition: 0.1s linear; 
    filter: drop-shadow(0 10px 20px rgba(0,0,0,0.15));
}
#brandName { font-size: 3.8rem; font-weight: 800; margin: 0; letter-spacing: -3px; }
.talk-thin { font-weight: 100; letter-spacing: -1px; margin-left: 2px; }
#status { margin-top: 10px; margin-bottom: 70px; /* Spaced further apart */ font-weight: 400; opacity: 0.6; letter-spacing: 2px; text-transform: uppercase; font-size: 11px; }

/* ---------------- MODERN BUTTONS ---------------- */
.callButtons { display: flex; gap: 20px; align-items: center; }
.circleBtn { 
    width: 72px; height: 72px; border: none; background: none; cursor: pointer; padding: 0; 
    transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.2s; 
}
.circleBtn:hover { transform: translateY(-5px); filter: drop-shadow(0 0 10px rgba(255,255,255,0.4)); }
.circleBtn:active { transform: scale(0.9); }

.spinning { animation: spin 1.2s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
@keyframes spin { 100% { transform: rotate(360deg); } }

/* ---------------- CHAT ---------------- */
#chatBox {
    margin-top: auto; display: flex; flex-direction: column;
    height: 70%; border-radius: 20px; background: rgba(255, 255, 255, 0.05);
    padding: 15px; border: 1px solid rgba(255,255,255,0.08);
}
#messages { flex: 1; overflow-y: auto; }
#messages p { background: rgba(255, 255, 255, 0.1); padding: 12px; border-radius: 15px; margin: 8px 0; font-size: 14px; }
#chatControls { display: flex; gap: 8px; margin-top: 10px; }
#chatControls input { flex: 1; padding: 12px; border-radius: 12px; border: none; background: rgba(0,0,0,0.3); color: white; outline: none; }
#chatControls button { padding: 0 15px; border-radius: 12px; border: none; background: white; font-weight: 800; cursor: pointer; color: black; }

/* ---------------- MODALS ---------------- */
.modal {
    display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 350px; background: rgba(25, 25, 30, 0.98); backdrop-filter: blur(30px);
    border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 30px; padding: 30px; z-index: 1000;
}
.modal-close { position: absolute; top: 20px; right: 20px; cursor: pointer; font-size: 24px; opacity: 0.5; }
</style>
</head>

<body>

<div id="leftPanel">
    <div id="onlineTop" style="cursor:pointer; display: flex; justify-content: space-between; font-weight: 600;" onclick="document.getElementById('onlineDropdown').classList.toggle('open')">
        <span id="onlineCount">Discover (0)</span> <span>▼</span>
    </div>
    <div id="onlineDropdown" style="max-height:0; overflow:hidden; transition:0.3s; margin-top:10px;"></div>

    <div id="chatBox">
        <div id="messages"></div>
        <div id="chatControls">
            <input id="msgInput" placeholder="Say hello...">
            <button id="sendBtn">Send</button>
        </div>
    </div>
</div>

<div id="centerPanel">
    <svg id="mainLogo" viewBox="0 0 100 100">
        <defs>
            <mask id="modernLogoMask">
                <rect width="100" height="100" fill="white" />
                <path d="M50 75 L30 52 C22 40 28 28 40 28 C45 28 50 32 50 32 C50 32 55 28 60 28 C72 28 78 40 70 52 L50 75 Z" fill="black" />
            </mask>
        </defs>
        <rect x="5" y="5" width="90" height="90" rx="24" fill="white" mask="url(#modernLogoMask)" />
    </svg>

    <div id="brandName">Love<span class="talk-thin">Talk</span></div>
    <div id="status">Secure & Online</div>

    <div class="callButtons">
        <button class="circleBtn" id="muteBtn">
            <svg viewBox="0 0 100 100">
                <defs>
                    <mask id="micMaskM">
                        <rect width="100" height="100" fill="white"/>
                        <rect x="43" y="28" width="14" height="24" rx="7" fill="black"/>
                        <path d="M36 45c0 8 14 8 14 8s14 0 14-8" fill="none" stroke="black" stroke-width="5" stroke-linecap="round"/>
                        <line x1="50" y1="53" x2="50" y2="65" stroke="black" stroke-width="5" stroke-linecap="round"/>
                        <line id="muteSlash" x1="25" y1="25" x2="75" y2="75" stroke="black" stroke-width="8" stroke-linecap="round" style="display:none;"/>
                    </mask>
                </defs>
                <circle cx="50" cy="50" r="45" fill="white" mask="url(#micMaskM)"/>
            </svg>
        </button>

        <button id="callBtn" class="circleBtn">
            <svg viewBox="0 0 100 100">
                <defs>
                    <mask id="callMaskM">
                        <rect width="100" height="100" fill="white"/>
                        <path d="M30 40c0-4 4-8 8-8h24c4 0 8 4 8 8v4c0 12-10 22-22 22h-6c-4 0-8-4-8-8v-18z" fill="black" transform="rotate(-45 50 50)"/>
                    </mask>
                </defs>
                <circle cx="50" cy="50" r="45" fill="white" mask="url(#callMaskM)"/>
            </svg>
        </button>

        <button class="circleBtn" id="friendBtn">
            <svg viewBox="0 0 100 100">
                <defs>
                    <mask id="plusMaskM">
                        <rect width="100" height="100" fill="white"/>
                        <path d="M50 32v36M32 50h36" stroke="black" stroke-width="10" stroke-linecap="round"/>
                    </mask>
                </defs>
                <circle cx="50" cy="50" r="45" fill="white" mask="url(#plusMaskM)"/>
            </svg>
        </button>

        <button class="circleBtn" id="reportBtn">
            <svg viewBox="0 0 100 100">
                <defs>
                    <mask id="exclMaskM">
                        <rect width="100" height="100" fill="white"/>
                        <path d="M50 32v25" stroke="black" stroke-width="10" stroke-linecap="round"/>
                        <circle cx="50" cy="70" r="6" fill="black"/>
                    </mask>
                </defs>
                <circle cx="50" cy="50" r="45" fill="white" mask="url(#exclMaskM)"/>
            </svg>
        </button>
    </div>

    <div style="margin-top:40px; display:flex; gap:25px; font-size:12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; opacity: 0.5;">
        <label style="cursor: pointer; display: flex; align-items: center; gap: 8px;"><input type="checkbox" id="autoCall"> Auto-match</label>
        <div onclick="openHistory()" style="cursor:pointer; text-decoration:underline;">Log</div>
    </div>
</div>

<script>
const socket = io();
let callHistory = [];

document.getElementById("muteBtn").onclick = () => {
    const slash = document.getElementById("muteSlash");
    slash.style.display = slash.style.display === "none" ? "block" : "none";
};

const callBtn = document.getElementById("callBtn");
callBtn.onclick = () => {
    callBtn.classList.toggle("spinning");
    document.getElementById("status").textContent = callBtn.classList.contains("spinning") ? "Searching for connection..." : "Secure & Online";
};

/* ---------------- AUDIO REACTIVE LOGO ---------------- */
navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const analyser = ctx.createAnalyser();
    const mic = ctx.createMediaStreamSource(stream);
    mic.connect(analyser); analyser.fftSize=256;
    const dataArray = new Uint8Array(analyser.frequencyBinCount);
    const logo = document.getElementById("mainLogo");
    function animate(){
        analyser.getByteFrequencyData(dataArray);
        const avg = dataArray.reduce((a,b)=>a+b)/dataArray.length;
        logo.style.transform = `scale(${1 + (avg / 200)})`;
        requestAnimationFrame(animate);
    }
    animate();
}).catch(() => {});
</script>
</body>
</html>
