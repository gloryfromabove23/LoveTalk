<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoveTalk ♥︎</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
:root { 
    --bg-gradient: linear-gradient(135deg, #FF9A8B 0%, #FF6A88 55%, #FF99AC 100%);
    --glass: rgba(255, 255, 255, 0.12);
    --glass-border: rgba(255, 255, 255, 0.2);
    --accent: #4BFF8B;
    --danger: #ff4b4b;
    --apple-blue: #007aff;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }

body { 
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg-gradient);
    background-size: 400% 400%;
    animation: gradientShift 15s ease infinite;
    color: white;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

@keyframes gradientShift { 0% { background-position: 0% 50% } 50% { background-position: 100% 50% } 100% { background-position: 0% 50% } }

/* HEADER & LOGO UNIT */
header {
    height: 70px;
    padding: 0 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(0,0,0,0.15);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--glass-border);
    z-index: 1000;
}

.logo-unit { display: flex; align-items: center; gap: 10px; cursor: pointer; }
.logo-unit svg { width: 32px; height: 32px; fill: white; }
.brand { font-weight: 800; font-size: 22px; letter-spacing: -1px; }

.header-right { display: flex; gap: 12px; align-items: center; }
.id-badge { background: var(--glass); padding: 6px 14px; border-radius: 20px; font-size: 11px; font-weight: 700; border: 1px solid var(--glass-border); color: #fff; }

/* MAIN LAYOUT */
#mainApp { display: flex; flex: 1; height: calc(100vh - 70px); min-height: 0; }

/* LEFT PANEL (CHAT) */
#chatPanel {
    flex: 1.2;
    display: flex;
    flex-direction: column;
    padding: 15px;
    border-right: 1px solid var(--glass-border);
    min-width: 320px;
}

.chat-container {
    flex: 1;
    background: #ffffff;
    border-radius: 24px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

.chat-header {
    padding: 12px;
    text-align: center;
    background: #fdfdfd;
    border-bottom: 1px solid #f0f0f0;
    color: #1d1d1f;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.5px;
}

#messages {
    flex: 1;
    overflow-y: auto;
    padding: 15px;
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.msg { max-width: 80%; }
.msg.mine { align-self: flex-end; }
.msg.other { align-self: flex-start; }
.bubble { padding: 10px 16px; border-radius: 18px; font-size: 14px; line-height: 1.4; }
.msg.mine .bubble { background: var(--apple-blue); color: white; border-bottom-right-radius: 4px; }
.msg.other .bubble { background: #e9e9eb; color: #000; border-bottom-left-radius: 4px; }

/* RIGHT PANEL (HUB) */
#hubPanel {
    flex: 0.8;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    background: rgba(0,0,0,0.05);
    min-width: 300px;
    overflow-y: auto;
}

.list-section { width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
.glass-box {
    background: var(--glass);
    backdrop-filter: blur(10px);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    padding: 15px;
    height: 150px;
    overflow-y: auto;
}
.glass-box h4 { font-size: 10px; text-transform: uppercase; margin-bottom: 10px; color: var(--accent); opacity: 0.9; }

.user-row {
    font-size: 12px; padding: 6px 0; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05);
    display: flex; justify-content: space-between;
}
.user-row:hover { color: var(--accent); }

/* CALLING CENTER */
.call-display { text-align: center; margin-bottom: 30px; }
.status-text { font-size: 36px; font-weight: 800; letter-spacing: -1.5px; margin-bottom: 5px; }
.sub-text { font-size: 12px; opacity: 0.7; }

.controls { display: flex; gap: 15px; align-items: center; }
.btn {
    width: 60px; height: 60px; border-radius: 50%; border: none;
    background: var(--glass); cursor: pointer; color: white;
    display: flex; align-items: center; justify-content: center;
    transition: 0.2s; position: relative;
}
.btn:hover { transform: translateY(-2px); background: rgba(255,255,255,0.2); }
.btn svg { width: 24px; height: 24px; fill: currentColor; }
.btn.main-call { width: 80px; height: 80px; background: var(--accent); color: black; }
.btn.danger-btn { color: var(--danger); }
.btn-lbl { position: absolute; bottom: -20px; font-size: 9px; font-weight: 800; white-space: nowrap; }

/* HISTORY PANEL */
#historyTab {
    position: fixed; right: -350px; top: 0; width: 320px; height: 100vh;
    background: #000; z-index: 2000; transition: 0.3s; padding: 25px;
}
#historyTab.open { right: 0; }

#contextMenu {
    display: none; position: fixed; background: #2c2c2e; border-radius: 10px;
    padding: 5px; z-index: 5000; width: 140px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}
#contextMenu button {
    width: 100%; background: none; border: none; color: white;
    text-align: left; padding: 10px; border-radius: 6px; cursor: pointer; font-size: 11px;
}
#contextMenu button:hover { background: rgba(255,255,255,0.1); }

@media (max-width: 800px) {
    #mainApp { flex-direction: column; overflow-y: auto; }
    #chatPanel { height: 500px; flex: none; border-right: none; border-bottom: 1px solid var(--glass-border); }
}
</style>
</head>
<body>

<header>
    <div class="logo-unit" onclick="location.reload()">
        <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
        <div class="brand">LoveTalk</div>
    </div>
    <div class="header-right">
        <div id="myId" class="id-badge">...</div>
        <button onclick="toggleHistory()" style="background:white; color:black; border:none; padding:6px 12px; border-radius:20px; font-size:10px; font-weight:800; cursor:pointer;">HISTORY</button>
    </div>
</header>

<div id="mainApp">
    <section id="chatPanel">
        <div class="chat-container">
            <div class="chat-header" id="activePeer">CHAT</div>
            <div id="messages">
                <div style="margin: auto; text-align: center; opacity: 0.3; font-size: 12px;">Start a call to chat</div>
            </div>
            <div id="memeGallery"></div>
            <div style="padding: 12px; border-top: 1px solid #f0f0f0; display: flex; gap: 8px;">
                <input type="text" id="msgInput" placeholder="iMessage" style="flex:1; border:none; background:#f2f2f7; padding:10px 15px; border-radius:20px; outline:none;" onkeydown="if(event.key==='Enter')sendMsg()">
                <button onclick="sendMsg()" style="background:var(--apple-blue); border:none; color:white; width:36px; height:36px; border-radius:50%; cursor:pointer;">↑</button>
            </div>
        </div>
    </section>

    <section id="hubPanel">
        <div class="list-section">
            <div class="glass-box">
                <h4>ONLINE</h4>
                <div id="onlineList"></div>
            </div>
            <div class="glass-box">
                <h4>FAVORITES</h4>
                <div id="favList"></div>
            </div>
        </div>

        <div class="call-display">
            <h1 class="status-text" id="statusMain">READY</h1>
            <p class="sub-text" id="statusSub">Search for your better half</p>
        </div>

        <div class="controls">
            <button class="btn danger-btn" onclick="reportUser()">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
                <span class="btn-lbl">REPORT</span>
            </button>
            <button class="btn main-call" onclick="handleCall()" id="callBtn">
                <svg viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
                <span class="btn-lbl">START CALL</span>
            </button>
            <button class="btn" onclick="addFav()">
                <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                <span class="btn-lbl">FAVORITE</span>
            </button>
        </div>

        <div style="margin-top: 40px; font-size: 11px; display: flex; align-items: center; gap: 8px;">
            <input type="checkbox" id="autoCall"> <label for="autoCall">Auto-Next Connection</label>
        </div>
    </section>
</div>

<div id="historyTab">
    <div onclick="toggleHistory()" style="cursor:pointer; opacity:0.5; margin-bottom:20px;">✕ CLOSE</div>
    <h3 style="margin-bottom:15px;">Call Logs</h3>
    <div id="historyList"></div>
</div>

<div id="contextMenu">
    <button onclick="handleCall()">Call Back</button>
    <button onclick="addFav()">Add Favorite</button>
    <button style="color:var(--danger)" onclick="blockUser()">Block User</button>
</div>

<script>
let peer = null;
let myUser = {};
let favorites = JSON.parse(localStorage.getItem('lt_favs') || '[]');

const rFirst = ["Spark", "Affection", "Sweet", "Velvet", "Gaze", "Moon", "Rose", "Crush", "Heart", "Silk"];
const rLast = ["Soul", "Flame", "Baker", "Dream", "Hunter", "Starlight", "Petal", "Whisper", "Vibe", "Kiss"];

function init() {
    // Persistent Mock Identity
    let id = localStorage.getItem('lt_id');
    if(!id) {
        id = Math.floor(Math.random()*255)+"."+Math.floor(Math.random()*255)+"."+Math.floor(Math.random()*255);
        localStorage.setItem('lt_id', id);
    }
    let name = localStorage.getItem('lt_name');
    if(!name) {
        name = rFirst[Math.floor(Math.random()*rFirst.length)] + rLast[Math.floor(Math.random()*rLast.length)];
        localStorage.setItem('lt_name', name);
    }
    myUser = { name, ip: id };
    document.getElementById('myId').innerText = myUser.name + " (" + myUser.ip + ")";
    
    renderFavs();
    generateMockOnline();
}

function handleCall() {
    if(peer) endCall();
    else findPeer();
}

function findPeer() {
    const btn = document.getElementById('callBtn');
    document.getElementById('statusMain').innerText = "LINKING...";
    btn.style.background = "var(--danger)";
    
    setTimeout(() => {
        peer = rFirst[Math.floor(Math.random()*rFirst.length)] + rLast[Math.floor(Math.random()*rLast.length)] + "_" + Math.floor(Math.random()*99);
        document.getElementById('statusMain').innerText = "CONNECTED";
        document.getElementById('statusSub').innerText = "Speaking with " + peer;
        document.getElementById('activePeer').innerText = "CHAT WITH " + peer;
        document.getElementById('messages').innerHTML = `<div style="text-align:center; font-size:10px; opacity:0.3;">Joined room as ${myUser.name}</div>`;
        logCall(peer);
    }, 1500);
}

function endCall() {
    peer = null;
    document.getElementById('statusMain').innerText = "READY";
    document.getElementById('statusSub').innerText = "Search for your better half";
    document.getElementById('activePeer').innerText = "CHAT";
    document.getElementById('callBtn').style.background = "var(--accent)";
    
    if(document.getElementById('autoCall').checked) {
        setTimeout(findPeer, 1000);
    }
}

function sendMsg() {
    const input = document.getElementById('msgInput');
    if(!input.value.trim() || !peer) return;
    
    addBubble(input.value, true);
    input.value = "";
    
    setTimeout(() => {
        if(peer) addBubble("That is so romantic...", false);
    }, 1200);
}

function addBubble(text, mine) {
    const box = document.getElementById('messages');
    const d = document.createElement('div');
    d.className = "msg " + (mine ? "mine" : "other");
    d.innerHTML = `<div class="bubble">${text}</div>`;
    box.appendChild(d);
    box.scrollTop = box.scrollHeight;
}

function logCall(name) {
    const list = document.getElementById('historyList');
    const d = document.createElement('div');
    d.className = "user-row";
    d.innerHTML = `<span>${name}</span> <span style="opacity:0.5">${new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>`;
    list.prepend(d);
}

function addFav() {
    const target = peer;
    if(!target || favorites.includes(target)) return;
    favorites.push(target);
    localStorage.setItem('lt_favs', JSON.stringify(favorites));
    renderFavs();
}

function renderFavs() {
    const list = document.getElementById('favList');
    list.innerHTML = favorites.map(f => `<div class="user-row">♥ ${f}</div>`).join('');
}

function reportUser() {
    if(!peer) return;
    alert("User " + peer + " has been reported for community violations. Connection severed.");
    endCall();
}

function blockUser() {
    alert("User blocked. You will no longer match with them.");
    endCall();
}

function toggleHistory() { document.getElementById('historyTab').classList.toggle('open'); }

function generateMockOnline() {
    const list = document.getElementById('onlineList');
    for(let i=0; i<8; i++) {
        let name = rFirst[Math.floor(Math.random()*rFirst.length)] + rLast[Math.floor(Math.random()*rLast.length)];
        let div = document.createElement('div');
        div.className = "user-row";
        div.innerHTML = `<span>🟢 ${name}</span>`;
        div.oncontextmenu = (e) => {
            e.preventDefault();
            const menu = document.getElementById('contextMenu');
            menu.style.display = 'block';
            menu.style.left = e.pageX + 'px';
            menu.style.top = e.pageY + 'px';
            window.onclick = () => menu.style.display = 'none';
        };
        list.appendChild(div);
    }
}

init();
</script>
</body>
</html>
