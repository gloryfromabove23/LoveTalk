<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LoveTalk | Connect</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root { 
    --bg: #000000;
    --card: #1c1c1e;
    --card-light: #2c2c2e;
    --text: #ffffff;
    --text-dim: #8e8e93;
    --ios-blue: #007aff;
    --ios-green: #34c759;
    --ios-red: #ff3b30;
    --glass: rgba(255, 255, 255, 0.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body { 
    font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
    background-color: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    overflow: hidden;
}

/* SIDEBAR NAVIGATION (IPHONE STYLE) */
#sidebar {
    width: 320px;
    background: #000;
    border-right: 1px solid var(--glass);
    display: flex;
    flex-direction: column;
    padding: 20px;
    gap: 20px;
}

header { display: flex; align-items: center; gap: 12px; padding-bottom: 20px; border-bottom: 1px solid var(--glass); }
.logo-svg { width: 40px; height: 40px; }

.section-label { font-size: 11px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-top: 10px; }

/* PANEL CARDS */
.panel { background: var(--card); border-radius: 20px; padding: 16px; border: 1px solid var(--glass); }

.list-container { max-height: 150px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
.list-item { 
    display: flex; justify-content: space-between; align-items: center; 
    padding: 8px 12px; background: var(--card-light); border-radius: 12px; font-size: 14px;
}

/* CHAT AREA */
#mainApp { flex: 1; display: flex; flex-direction: column; background: #000; position: relative; }

.chat-header { 
    padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; 
    background: rgba(28, 28, 30, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--glass);
}

#msgBox { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 12px; }
.bubble { max-width: 70%; padding: 12px 18px; border-radius: 22px; font-size: 16px; line-height: 1.4; }
.mine { align-self: flex-end; background: var(--ios-blue); color: white; border-bottom-right-radius: 4px; }
.other { align-self: flex-start; background: var(--card-light); color: white; border-bottom-left-radius: 4px; }
.sys { align-self: center; font-size: 11px; color: var(--text-dim); background: transparent; text-transform: uppercase; letter-spacing: 0.5px; }

/* CONTROLS */
.btn-row { display: flex; gap: 10px; margin-top: 5px; }
.action-btn { 
    flex: 1; padding: 10px; border-radius: 12px; border: none; font-size: 12px; font-weight: 600; 
    cursor: pointer; transition: 0.2s; color: white; background: var(--card-light);
}
.action-btn:active { transform: scale(0.95); opacity: 0.8; }
.btn-blue { background: var(--ios-blue); }
.btn-red { background: var(--ios-red); }

.input-area { padding: 20px 30px 40px; display: flex; gap: 10px; align-items: center; }
.ios-input-wrap { flex: 1; background: var(--card); border-radius: 25px; padding: 5px 15px; border: 1px solid var(--glass); display: flex; }
.ios-input-wrap input { flex: 1; background: none; border: none; color: white; padding: 10px; outline: none; font-size: 16px; }

/* MODALS / OVERLAYS */
@media (max-width: 900px) {
    body { flex-direction: column; }
    #sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--glass); }
}
</style>
</head>
<body>

<aside id="sidebar">
    <header>
        <svg class="logo-svg" viewBox="0 0 100 100">
            <path d="M50 85 C50 85 15 60 15 35 A18 18 0 0 1 51 35 A18 18 0 0 1 85 35 C85 60 50 85 50 85" fill="none" stroke="white" stroke-width="6" stroke-linecap="round"/>
            <path d="M50 85 L70 85 C85 85 85 75 85 75" fill="none" stroke="#007aff" stroke-width="6" stroke-linecap="round"/>
        </svg>
        <div style="line-height: 1.1;">
            <h1 style="font-size: 20px; font-weight: 800;">LoveTalk</h1>
            <p id="myId" style="font-size: 12px; color: var(--ios-blue);">@guest</p>
        </div>
    </header>

    <div class="panel">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <span class="label">Auto-Reconnect</span>
            <input type="checkbox" id="autoCall" style="accent-color: var(--ios-green);">
        </div>
        <button id="mainToggle" onclick="toggleConnect()" class="action-btn btn-blue" style="width:100%; margin-top:15px; height:50px; font-size:16px;">Start Discovery</button>
    </div>

    <p class="section-label">Friends & Souls</p>
    <div class="panel list-container" id="friendList">
        <div style="text-align:center; color:var(--text-dim); font-size:12px;">No friends added yet.</div>
    </div>

    <p class="section-label">Call History</p>
    <div class="panel list-container" id="historyList">
        <div style="text-align:center; color:var(--text-dim); font-size:12px;">Recent calls appear here.</div>
    </div>
</aside>

<main id="mainApp">
    <div class="chat-header">
        <div>
            <h2 id="peerDisplay" style="font-size: 17px; font-weight: 700;">Discovery Idle</h2>
            <p id="peerStatus" style="font-size: 12px; color: var(--text-dim);">Find someone new...</p>
        </div>
        <div class="btn-row" id="peerActions" style="display:none;">
            <button class="action-btn" onclick="addFriend()">Add Friend</button>
            <button class="action-btn btn-red" onclick="blockReport()">Block</button>
        </div>
    </div>

    <div id="msgBox">
        <div class="bubble sys">End-to-end encryption is active. Stay safe.</div>
    </div>

    <div class="input-area">
        <div class="ios-input-wrap">
            <input type="text" id="msgInput" placeholder="iMessage" onkeydown="if(event.key==='Enter')sendMsg()">
        </div>
        <button onclick="sendMsg()" style="background:var(--ios-blue); border:none; color:white; width:35px; height:35px; border-radius:50%; font-weight:bold; cursor:pointer;">↑</button>
    </div>
</main>

<script>
let activePeer = null;
let friends = JSON.parse(localStorage.getItem('lt_friends') || '[]');
let history = JSON.parse(localStorage.getItem('lt_history') || '[]');
let blocked = JSON.parse(localStorage.getItem('lt_blocked') || '[]');

const adj = ["Golden", "Wild", "Cosmic", "Mellow", "Cyber", "Drunken", "Happy", "Silk"];
const names = ["Tiger", "Pizza", "Spirit", "Noodle", "Falcon", "Toast", "Echo", "Wave"];

function generateName() {
    return adj[Math.floor(Math.random()*adj.length)] + names[Math.floor(Math.random()*names.length)] + Math.floor(Math.random()*99);
}

function init() {
    document.getElementById('myId').innerText = "@" + generateName();
    renderLists();
}

function toggleConnect() {
    if(activePeer) {
        disconnect();
    } else {
        startSearch();
    }
}

function startSearch() {
    const btn = document.getElementById('mainToggle');
    const display = document.getElementById('peerDisplay');
    btn.innerText = "Searching...";
    btn.style.opacity = "0.6";
    display.innerText = "Connecting...";

    setTimeout(() => {
        let newPeer = generateName();
        if(blocked.includes(newPeer)) return startSearch(); // Skip blocked
        
        activePeer = newPeer;
        display.innerText = activePeer;
        document.getElementById('peerStatus').innerText = "Encrypted Connection";
        document.getElementById('peerActions').style.display = "flex";
        btn.innerText = "End Call";
        btn.className = "action-btn btn-red";
        btn.style.opacity = "1";
        
        addMsg("You are now talking to a stranger.", "sys");
        addToHistory(activePeer);
    }, 1500);
}

function disconnect() {
    if(!activePeer) return;
    addMsg("Call ended with " + activePeer, "sys");
    activePeer = null;
    
    const btn = document.getElementById('mainToggle');
    btn.innerText = "Start Discovery";
    btn.className = "action-btn btn-blue";
    document.getElementById('peerDisplay').innerText = "Discovery Idle";
    document.getElementById('peerStatus').innerText = "Find someone new...";
    document.getElementById('peerActions').style.display = "none";

    if(document.getElementById('autoCall').checked) {
        setTimeout(startSearch, 1000);
    }
}

function sendMsg() {
    const input = document.getElementById('msgInput');
    if(!input.value.trim() || !activePeer) return;
    addMsg(input.value, 'mine');
    input.value = "";
    
    setTimeout(() => {
        if(activePeer) addMsg("That sounds interesting!", "other");
    }, 1200);
}

function addMsg(text, type) {
    const box = document.getElementById('msgBox');
    const div = document.createElement('div');
    div.className = "bubble " + type;
    div.innerText = text;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}

function addToHistory(name) {
    history.unshift({name: name, time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})});
    if(history.length > 5) history.pop();
    localStorage.setItem('lt_history', JSON.stringify(history));
    renderLists();
}

function addFriend() {
    if(activePeer && !friends.includes(activePeer)) {
        friends.push(activePeer);
        localStorage.setItem('lt_friends', JSON.stringify(friends));
        alert(activePeer + " added to friends!");
        renderLists();
    }
}

function blockReport() {
    if(activePeer) {
        if(confirm("Block and report this user?")) {
            blocked.push(activePeer);
            localStorage.setItem('lt_blocked', JSON.stringify(blocked));
            disconnect();
        }
    }
}

function renderLists() {
    const fBox = document.getElementById('friendList');
    const hBox = document.getElementById('historyList');

    if(friends.length > 0) {
        fBox.innerHTML = friends.map(f => `<div class="list-item"><span>${f}</span><span style="color:var(--ios-green)">●</span></div>`).join('');
    }

    if(history.length > 0) {
        hBox.innerHTML = history.map(h => `<div class="list-item"><span>${h.name}</span><span style="color:var(--text-dim); font-size:10px;">${h.time}</span></div>`).join('');
    }
}

init();
</script>
</body>
</html>
