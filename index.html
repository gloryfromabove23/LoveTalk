<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoveTalk | Connection Refined</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root { 
    --bg: #0f1115;
    --panel: #16191f;
    --card: #1e222a;
    --text: #f8fafc;
    --text-dim: #94a3b8;
    --accent: #2dd4bf; /* Teal */
    --accent-soft: rgba(45, 212, 191, 0.1);
    --rose: #fb7185;
    --blue: #3b82f6;
    --border: rgba(255, 255, 255, 0.06);
    --glass: rgba(255, 255, 255, 0.02);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }

body { 
    font-family: 'Plus Jakarta Sans', sans-serif;
    background-color: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* NAVIGATION */
header {
    height: 70px;
    padding: 0 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border);
    background: rgba(15, 17, 21, 0.8);
    backdrop-filter: blur(12px);
    z-index: 100;
}

.brand { display: flex; align-items: center; gap: 10px; cursor: pointer; }
.brand svg { width: 28px; height: 28px; fill: var(--rose); filter: drop-shadow(0 0 10px rgba(251, 113, 133, 0.4)); }
.brand span { font-weight: 800; font-size: 20px; letter-spacing: -0.5px; background: linear-gradient(to right, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

.status-pill {
    background: var(--accent-soft);
    border: 1px solid rgba(45, 212, 191, 0.2);
    padding: 6px 14px;
    border-radius: 100px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    font-weight: 600;
    color: var(--accent);
}

/* LAYOUT */
#appContainer { display: flex; flex: 1; overflow: hidden; padding: 15px; gap: 15px; }

/* CHAT (Kept as requested, but nested in a modern frame) */
#chatSection { flex: 1.4; display: flex; flex-direction: column; height: 100%; }
.chat-outer {
    flex: 1; background: #ffffff; border-radius: 24px; display: flex; flex-direction: column;
    overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
}
.chat-head { padding: 14px; text-align: center; background: #f8fafc; border-bottom: 1px solid #e2e8f0; color: #0f172a; font-weight: 700; font-size: 13px; letter-spacing: 0.5px; }
#messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; background: #fff; }

.msg { max-width: 80%; display: flex; flex-direction: column; }
.msg.mine { align-self: flex-end; align-items: flex-end; }
.msg.other { align-self: flex-start; align-items: flex-start; }
.bubble { padding: 12px 16px; border-radius: 18px; font-size: 15px; line-height: 1.5; }
.msg.mine .bubble { background: var(--blue); color: white; border-bottom-right-radius: 4px; }
.msg.other .bubble { background: #f1f5f9; color: #1e293b; border-bottom-left-radius: 4px; }

.chat-input-area { padding: 15px; background: #fff; border-top: 1px solid #f1f5f9; }
.input-wrap { display: flex; align-items: center; gap: 10px; background: #f8fafc; padding: 6px 14px; border-radius: 100px; border: 1px solid #e2e8f0; }
.input-wrap input { flex: 1; border: none; background: transparent; padding: 10px; outline: none; font-size: 15px; color: #1e293b; }

/* CONTROL HUB (Redone for Modern Sleek Look) */
#hubSection {
    flex: 0.8;
    background: var(--panel);
    border-radius: 24px;
    display: flex;
    flex-direction: column;
    padding: 24px;
    gap: 20px;
    border: 1px solid var(--border);
}

.card-label { font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--text-dim); letter-spacing: 1px; }

.activity-list { height: 140px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
.activity-item { 
    background: var(--glass); padding: 10px 14px; border-radius: 12px; font-size: 13px; 
    display: flex; justify-content: space-between; border: 1px solid var(--border); transition: 0.3s;
}
.activity-item:hover { background: var(--card); border-color: var(--accent); }

.call-hero {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 20px;
}
.call-hero h1 { font-size: 42px; font-weight: 800; letter-spacing: -1.5px; margin-bottom: 5px; }
.call-hero p { color: var(--text-dim); font-size: 14px; }

/* REIMAGINED BUTTONS */
.button-grid { display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 10px; }
.action-tile {
    width: 56px; height: 56px; border-radius: 18px; border: 1px solid var(--border);
    background: var(--card); color: var(--text); cursor: pointer; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    display: flex; align-items: center; justify-content: center;
}
.action-tile:hover { transform: scale(1.1); background: var(--bg); border-color: var(--text-dim); }
.action-tile svg { width: 22px; height: 22px; stroke: currentColor; stroke-width: 2; fill: none; }

.action-tile.main {
    width: 80px; height: 80px; background: var(--accent); color: var(--bg); border: none; border-radius: 24px;
    box-shadow: 0 10px 30px -5px rgba(45, 212, 191, 0.4);
}
.action-tile.main:hover { transform: scale(1.05) rotate(5deg); box-shadow: 0 15px 35px -5px rgba(45, 212, 191, 0.6); }

.action-tile.danger { color: var(--rose); }
.action-tile.danger:hover { background: rgba(251, 113, 133, 0.1); border-color: var(--rose); }

/* MEME DRAWER */
#memeSection { display: none; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 12px; background: #f1f5f9; max-height: 180px; overflow-y: auto; }
.meme-thumb { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 8px; cursor: pointer; transition: 0.2s; }
.meme-thumb:hover { transform: scale(1.05); z-index: 2; }

@media (max-width: 1000px) {
    #appContainer { flex-direction: column; overflow-y: auto; }
    #hubSection { flex: none; order: 1; }
    #chatSection { height: 600px; flex: none; order: 2; }
}
</style>
</head>
<body>

<header>
    <div class="brand" onclick="location.reload()">
        <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l8.84-8.84 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        <span>LoveTalk</span>
    </div>
    
    <div style="display: flex; align-items: center; gap: 15px;">
        <div class="status-pill">
            <span style="width: 6px; height: 6px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent);"></span>
            <span id="userNameDisplay">Guest</span>
        </div>
        <div class="action-tile" style="width:40px; height:40px; border-radius:12px;" onclick="alert('History encrypted.')">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        </div>
    </div>
</header>

<div id="appContainer">
    <section id="chatSection">
        <div class="chat-outer">
            <div class="chat-head" id="chatTitle">READY TO PAIR</div>
            <div id="messages">
                <div style="margin: auto; text-align: center; max-width: 200px;">
                    <p style="color: #94a3b8; font-size: 13px;">Find a connection to begin a secure chat.</p>
                </div>
            </div>
            <div id="memeSection"></div>
            <div class="chat-input-area">
                <div class="input-wrap">
                    <button onclick="toggleMemes()" style="background:none; border:none; cursor:pointer; font-size:18px;">✨</button>
                    <input type="text" id="chatInput" placeholder="Message..." onkeydown="if(event.key==='Enter')sendText()">
                    <button onclick="sendText()" style="background:var(--blue); border:none; color:white; width:32px; height:32px; border-radius:50%; cursor:pointer; font-weight:800;">↑</button>
                </div>
            </div>
        </div>
    </section>

    <section id="hubSection">
        <div>
            <p class="card-label">Community Pulse</p>
            <div class="activity-list" id="pulseList"></div>
        </div>

        <div class="call-hero">
            <h1 id="statusMain">Idle</h1>
            <p id="statusSub">Connect anonymously with the world.</p>
        </div>

        <div class="button-grid">
            <button class="action-tile danger" onclick="report()">
                <svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0zM12 9v4m0 4h.01"/></svg>
            </button>

            <button class="action-tile main" onclick="toggleCall()" id="mainBtn">
                <svg id="callIcon" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
            </button>

            <button class="action-tile" onclick="savePeer()">
                <svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
            </button>
        </div>

        <div style="margin-top: auto;">
            <p class="card-label">Soulmates</p>
            <div class="activity-list" id="soulmateList"></div>
        </div>
    </section>
</div>

<script>
let sessionPeer = null;
let savedPeers = JSON.parse(localStorage.getItem('lt_saved') || '[]');

const namesA = ["Neon", "Velvet", "Silent", "Midnight", "Aura", "Electric", "Lunar", "Solar", "Jade"];
const namesB = ["Soul", "Vibe", "Echo", "Flow", "Wisp", "Gaze", "Pulse", "Mist", "Ghost"];

function init() {
    let stored = localStorage.getItem('lt_username');
    if(!stored) {
        stored = namesA[Math.floor(Math.random()*9)] + (Math.floor(Math.random()*89)+10);
        localStorage.setItem('lt_username', stored);
    }
    document.getElementById('userNameDisplay').innerText = stored;
    refreshLists();
    loadMemeLib();
}

function toggleCall() {
    if(sessionPeer) quitCall();
    else findPeer();
}

function findPeer() {
    const btn = document.getElementById('mainBtn');
    document.getElementById('statusMain').innerText = "Linking...";
    btn.style.background = "var(--rose)";
    
    setTimeout(() => {
        sessionPeer = namesA[Math.floor(Math.random()*9)] + namesB[Math.floor(Math.random()*9)];
        document.getElementById('statusMain').innerText = "Connected";
        document.getElementById('statusSub').innerText = "Talking with " + sessionPeer;
        document.getElementById('chatTitle').innerText = sessionPeer.toUpperCase();
        addMessage(`End-to-end encryption active.`, 'system');
    }, 1200);
}

function quitCall() {
    sessionPeer = null;
    document.getElementById('statusMain').innerText = "Idle";
    document.getElementById('statusSub').innerText = "Connect anonymously with the world.";
    document.getElementById('chatTitle').innerText = "READY TO PAIR";
    document.getElementById('mainBtn').style.background = "var(--accent)";
    addMessage("Connection terminated.", "system");
}

function sendText() {
    const el = document.getElementById('chatInput');
    if(!el.value.trim() || !sessionPeer) return;
    addMessage(el.value, 'mine');
    el.value = "";
    setTimeout(() => { if(sessionPeer) addMessage("Thinking about that...", 'other'); }, 1400);
}

function addMessage(txt, type) {
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    if(type === 'system') {
        div.style.cssText = "text-align:center; font-size:11px; color:#94a3b8; margin:15px 0; text-transform:uppercase; letter-spacing:1px;";
        div.innerText = txt;
    } else {
        div.className = "msg " + type;
        div.innerHTML = `<div class="bubble">${txt}</div>`;
    }
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
}

function toggleMemes() {
    const box = document.getElementById('memeSection');
    box.style.display = box.style.display === 'grid' ? 'none' : 'grid';
}

async function loadMemeLib() {
    try {
        const r = await fetch('https://api.imgflip.com/get_memes');
        const j = await r.json();
        document.getElementById('memeSection').innerHTML = j.data.memes.slice(0, 48).map(m => 
            `<img src="${m.url}" class="meme-thumb" onclick="pushMeme('${m.url}')">`
        ).join('');
    } catch(err) {}
}

function pushMeme(url) {
    if(!sessionPeer) return;
    addMessage(`<img src="${url}" style="width:100%; border-radius:12px;">`, 'mine');
    toggleMemes();
}

function savePeer() {
    if(!sessionPeer || savedPeers.includes(sessionPeer)) return;
    savedPeers.push(sessionPeer);
    localStorage.setItem('lt_saved', JSON.stringify(savedPeers));
    refreshLists();
}

function refreshLists() {
    // Pulse
    const p = document.getElementById('pulseList');
    p.innerHTML = "";
    for(let i=0; i<3; i++) {
        let n = namesA[Math.floor(Math.random()*9)] + namesB[Math.floor(Math.random()*9)];
        p.innerHTML += `<div class="activity-item"><span>${n}</span><span style="color:var(--accent)">Active</span></div>`;
    }
    // Saved
    document.getElementById('soulmateList').innerHTML = savedPeers.map(s => 
        `<div class="activity-item"><span>${s}</span><span>♥</span></div>`
    ).join('');
}

function report() { if(sessionPeer) { alert("User Reported. Connection severed."); quitCall(); } }

init();
</script>
</body>
</html>
