<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LoveTalk ♥︎</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
/* ---------------- BASE ---------------- */
body{
    margin:0;
    font-family:'Inter',sans-serif;
    background:#16171b;
    color:white;
    display:flex;
    height:100vh;
    overflow:hidden;
    position:relative;
}

/* ---------------- FLOATING GRADIENT MESH ---------------- */
.mesh-bg{
    position:fixed;
    width:200%;
    height:200%;
    top:-50%;
    left:-50%;
    background:
        radial-gradient(circle at 20% 30%, #F0A2A4 0%, transparent 40%),
        radial-gradient(circle at 70% 60%, #ff6f91 0%, transparent 40%),
        radial-gradient(circle at 40% 80%, #ff9eb5 0%, transparent 40%);
    animation: meshMove 18s ease-in-out infinite alternate;
    z-index:-3;
}

@keyframes meshMove{
    0%{ transform:translate(0,0) rotate(0deg);}
    50%{ transform:translate(-5%,5%) rotate(5deg);}
    100%{ transform:translate(5%,-5%) rotate(-5deg);}
}

/* ---------------- SUBTLE GRAIN ---------------- */
.grain-overlay{
    position:fixed;
    inset:0;
    background-image:url("data:image/svg+xml;utf8,\
<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100'>\
<filter id='noise'>\
<feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/>\
</filter>\
<rect width='100%' height='100%' filter='url(%23noise)' opacity='0.05'/>\
</svg>");
    z-index:-2;
    pointer-events:none;
}

/* ---------------- LAYOUT ---------------- */
#leftPanel{
    width:420px;
    background:rgba(20,20,25,0.6);
    backdrop-filter:blur(25px);
    border:1px solid rgba(255,255,255,0.05);
    box-shadow:0 10px 40px rgba(0,0,0,0.4);
    display:flex;
    flex-direction:column;
    padding:25px;
    position:relative;
}

#centerPanel{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

#rightPanel{
    width:280px;
    background:rgba(20,20,25,0.6);
    backdrop-filter:blur(25px);
    border:1px solid rgba(255,255,255,0.05);
    box-shadow:0 10px 40px rgba(0,0,0,0.4);
    padding:25px;
    overflow-y:auto;
}

/* ---------------- LOGO ---------------- */
#mainLogo{
    width:260px;
    transition:transform 0.08s linear, filter 0.2s ease;
}

#brandName{
    font-size:2rem;
    font-weight:800;
    margin-top:15px;
    letter-spacing:-1px;
}

.accent { color:#222222; } /* slightly lighter than pure black */
}

/* ---------------- STATUS ---------------- */
#status{
    margin-top:10px;
    font-weight:600;
    color:#333333; } /* dark gray, more visible */
}

/* ---------------- CHAT BOX ---------------- */
#chatBox{
    flex:1;
    border-radius:25px;
    background:rgba(255,255,255,0.04);
    backdrop-filter:blur(20px);
    display:flex;
    flex-direction:column;
    padding:20px;
    position:relative;
    overflow:hidden;
}

/* ---------------- CHAT BUBBLES ---------------- */
#messages{
    flex:1;
    overflow-y:auto;
}
#messages p{
    background:rgba(255,255,255,0.08);
    padding:12px 16px;
    border-radius:18px;
    margin:8px 0;
    width:fit-content;
    max-width:75%;
    animation:popIn 0.25s ease;
}

@keyframes popIn{
    0%{ transform:scale(0.8); opacity:0;}
    100%{ transform:scale(1); opacity:1;}
}

#chatControls{
    display:flex;
    gap:10px;
    margin-top:15px;
}

#chatControls input{
    flex:1;
    padding:12px;
    border-radius:12px;
    border:none;
    background:#2b2c32;
    color:white;
}

#chatControls button{
    padding:12px 18px;
    border-radius:12px;
    border:none;
    background:#F0A2A4;
    color:black;
    font-weight:700;
    cursor:pointer;
    transition:0.2s;
}
#chatControls button:hover{
    transform:scale(1.05);
}

/* ---------------- USERS ---------------- */
#rightPanel h3{
    font-weight:800;
    margin-top:0;
}

.userItem{
    background:#2b2c32;
    padding:12px;
    border-radius:12px;
    margin-bottom:10px;
    display:flex;
    justify-content:space-between;
}
.statusDot{
    width:8px;
    height:8px;
    border-radius:50%;
    background:#F0A2A4;
}
</style>
</head>

<body>

<!-- FLOATING BACKGROUNDS -->
<div class="mesh-bg"></div>
<div class="grain-overlay"></div>

<!-- LEFT CHAT -->
<div id="leftPanel">
    <div id="chatBox">
        <div id="messages"></div>
        <div id="chatControls">
            <input id="msgInput" placeholder="Say something...">
            <button id="sendBtn">Send</button>
        </div>
    </div>
</div>

<!-- CENTER LOGO -->
<div id="centerPanel">

    <!-- CUSTOM SPEECH BUBBLE LOGO -->
<svg id="mainLogo" viewBox="0 0 100 100">

  <!-- Bubble with heart cut out -->
  <path
    fill="white"
    fill-rule="evenodd"
    d="
      M10 30
      Q10 10 30 10
      H70
      Q90 10 90 30
      V70
      Q90 90 70 90
      H30
      Q10 90 10 70
      Z

      M50 65
      C35 50,30 40,40 35
      C45 32,50 38,50 38
      C50 38,55 32,60 35
      C70 40,65 50,50 65Z
    "
  />

  <!-- Bubble tail -->
  <polygon points="30,80 45,95 45,80" fill="white"/>

</svg>

<div id="brandName">
    Love<span class="accent">Talk</span>
</div>

<div id="status">Online</div>
    
<!-- RIGHT USERS -->
<div id="rightPanel">
    <h3>People Online</h3>
    <div id="userList"></div>
</div>

<script>
/* ---------------- PULSE LOGO TO LOCAL VOICE ---------------- */
let audioContext, analyser, microphone, dataArray;
navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
    audioContext=new(window.AudioContext||window.webkitAudioContext)();
    analyser=audioContext.createAnalyser();
    microphone=audioContext.createMediaStreamSource(stream);
    microphone.connect(analyser);
    analyser.fftSize=256;

    dataArray=new Uint8Array(analyser.frequencyBinCount);
    const logo=document.getElementById("mainLogo");

    function animate(){
        analyser.getByteFrequencyData(dataArray);
        let avg=dataArray.reduce((a,b)=>a+b)/dataArray.length;
        let scale=1+avg/160;
        logo.style.transform=`scale(${scale})`;
        requestAnimationFrame(animate);
    }
    animate();
});

/* ---------------- LOGO GLOWS ON REMOTE SPEAK ---------------- */
function addRemoteAudio(stream){
    const audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    const analyserRemote = audioCtx.createAnalyser();
    const source = audioCtx.createMediaStreamSource(stream);
    source.connect(analyserRemote);
    analyserRemote.fftSize = 256;
    const dataRemote = new Uint8Array(analyserRemote.frequencyBinCount);
    const logo = document.getElementById("mainLogo");

    function detectRemote(){
        analyserRemote.getByteFrequencyData(dataRemote);
        let avg = dataRemote.reduce((a,b)=>a+b)/dataRemote.length;
        logo.style.filter = avg>25 ? "drop-shadow(0 0 25px #F0A2A4)" : "none";
        requestAnimationFrame(detectRemote);
    }
    detectRemote();
}

/* ---------------- TAB VISIBILITY STATUS ---------------- */
const status=document.getElementById("status");
function updateStatus(){
    if(document.hidden){
        status.textContent="Offline";
        status.style.color="black";
    }else{
        status.textContent="Online";
        status.style.color="black";
    }
}
document.addEventListener("visibilitychange",updateStatus);
updateStatus();

/* ---------------- CHAT DEMO ---------------- */
sendBtn.onclick=()=>{
    if(msgInput.value.trim()){
        let p=document.createElement("p");
        p.textContent=msgInput.value;
        messages.appendChild(p);
        msgInput.value="";
        messages.scrollTop=messages.scrollHeight;
    }
};
</script>

</body>
</html>
