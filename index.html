<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LoveTalk ♥︎</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root { --main-bg: linear-gradient(-45deg, #FF9A8B, #FF6A88, #FF99AC); --logo-dash: 400; --heart-fill: 0; }
body { margin: 0; font-family: 'Inter', sans-serif; background: var(--main-bg); background-size: 300% 300%; animation: grad 12s ease infinite; color: white; overflow-x: hidden; min-height: 100vh; display: flex; flex-direction: column; }
@keyframes grad { 0% { background-position: 0% 50% } 50% { background-position: 100% 50% } 100% { background-position: 0% 50% } }

#topBar { padding: 15px 30px; display: flex; justify-content: flex-end; background: rgba(0,0,0,0.1); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 1000; }
.theme-btn { background: white; color: black; border: none; padding: 8px 16px; border-radius: 20px; font-weight: 700; cursor: pointer; font-size: 10px; text-transform: uppercase; transition: transform 0.2s; }

#appView { display: flex; flex: 1; width: 100%; height: calc(100vh - 60px); min-height: 800px; }

#leftPanel { width: 380px; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(20px); border-right: 1px solid rgba(255, 255, 255, 0.1); display: flex; flex-direction: column; padding: 20px; flex-shrink: 0; }
#centerPanel { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }

#status { font-weight: 600; font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; margin-top: 10px; opacity: 0.8; color: white; }

/* Buttons */
.callButtons { display: flex; flex-direction: row; gap: 15px; align-items: center; margin-top: 30px; }
.circleBtn { width: 75px; height: 75px; border: none; border-radius: 50%; background: rgba(255,255,255,0.15); cursor: pointer; position: relative; display: flex; align-items: center; justify-content: center; transition: all 0.3s; }
.circleBtn:active { transform: scale(0.9); }

/* Report Button - Large & White */
#reportBtn { width: 85px; height: 85px; background: rgba(255,255,255,0.25); }
#reportBtn text { fill: white; font-size: 60px; font-weight: 900; }

.label-tag { position: absolute; bottom: -22px; font-size: 9px; font-weight: 900; color: white; white-space: nowrap; opacity: 0.7; }

/* Highlighted White Outlined Labels */
.extra-spacing { margin-top: 60px; display: flex; gap: 20px; }
.pill-label { border: 2px solid white; background: transparent; padding: 6px 15px; border-radius: 20px; font-size: 10px; font-weight: 800; text-transform: uppercase; color: white; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
.pill-label:hover { background: rgba(255,255,255,0.1); }

/* Logo & Chat */
#logoContainer { width: 160px; height: 160px; position: relative; }
.base-bubble { fill: white; }
.outline-trace { fill: none; stroke: #4BFF8B; stroke-width: 5; stroke-linecap: round; stroke-dasharray: 400; stroke-dashoffset: var(--logo-dash); transition: stroke-dashoffset 0.1s linear; display: none; }
.heart-cutout { fill: #4BFF8B; opacity: var(--heart-fill); transition: opacity 0.2s; }

#chatBox { margin-top: 15px; display: none; flex-direction: column; flex-grow: 1; background: #ffffff; border-radius: 20px; overflow: hidden; }
#chatHeader { padding: 10px; background: #f9f9f9; border-bottom: 1px solid #eee; color: #000; font-size: 12px; font-weight: 700; text-align: center; }

#messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; padding: 15px; color: #000; }
.msg-bubble { padding: 8px 15px; border-radius: 18px; max-width: 75%; font-size: 14px; }
.msg-bubble.mine { align-self: flex-end; background: #007aff; color: white; border-bottom-right-radius: 4px; }
.msg-bubble.theirs { align-self: flex-start; background: #e5e5ea; color: black; border-bottom-left-radius: 4px; }

#memeGallery { display: none; grid-template-columns: repeat(3, 1fr); gap: 4px; padding: 8px; background: #f2f2f7; max-height: 220px; overflow-y: auto; border-top: 1px solid #ddd; }
.meme-thumb { width: 100%; aspect-ratio: 1; object-fit: cover; cursor: pointer; border-radius: 4px; }

/* Responsive */
@media (max-width: 800px) {
    #appView { flex-direction: column; height: auto; min-height: 0; }
    #leftPanel { width: 100%; order: 2; height: 60vh; border-right: none; }
    #centerPanel { width: 100%; order: 1; padding: 40px 0; flex: none; }
}

#footerSpace { padding: 100px 15%; text-align: center; background: white; color: #333; }
footer { padding: 40px; text-align: center; font-size: 10px; background: #0b0b0d; color: #555; }
.modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 280px; background: #1a1a1a; border-radius: 20px; padding: 20px; z-index: 2000; text-align: center; border: 1px solid #333; }
</style>
</head>
<body>

<div id="topBar"><button class="theme-btn" onclick="openMod('cModal')">Edit Canvas</button></div>

<div id="appView">
    <div id="leftPanel">
        <div class="tab-header" onclick="toggleTab('onlineList')" style="font-size:10px; font-weight:800; border-bottom:1px solid rgba(255,255,255,0.1); padding:10px 0; cursor:pointer; display:flex; justify-content:space-between;">
            <span>VERIFIED HUMANS</span> <span id="onlineCount">142 ▾</span>
        </div>
        <div id="onlineList" style="max-height:80px; overflow-y:auto; font-size:11px; padding:10px 0;">
            <div style="opacity:0.6; margin-bottom:5px;">• User_882 (Active)</div>
            <div style="opacity:0.6; margin-bottom:5px;">• Human_412 (Chatting)</div>
        </div>

        <div class="tab-header" onclick="toggleTab('connDD')" style="font-size:10px; font-weight:800; border-bottom:1px solid rgba(255,255,255,0.1); padding:10px 0; cursor:pointer; display:flex; justify-content:space-between;">
            <span>CONNECTIONS</span> <span>▾</span>
        </div>
        <div id="connDD" style="max-height:80px; overflow-y:auto; font-size:11px; padding:10px 0;">
            <div id="connEmpty" style="opacity:0.3;">No active connections</div>
        </div>
        
        <div id="chatBox">
            <div id="chatHeader">Linked: <span id="chatPeerName">...</span></div>
            <div id="messages"></div>
            <div id="memeGallery"></div>
            <div style="display:flex; gap:8px; padding:10px; border-top: 1px solid #eee; align-items: center;">
                <button onclick="toggleMemeGallery()" style="background:none; border:none; cursor:pointer; font-size:22px;">🎲</button>
                <input id="msgInput" onkeydown="if(event.key==='Enter')sendMsg()" style="flex:1; background:#f2f2f7; border:none; color:black; padding:10px; border-radius:20px; outline:none;" placeholder="iMessage">
                <button onclick="sendMsg()" style="background:#007aff; color:#fff; border:none; border-radius:50%; width:30px; height:30px; cursor:pointer;">↑</button>
            </div>
        </div>
    </div>

    <div id="centerPanel">
        <div id="logoContainer">
            <svg viewBox="0 0 100 100">
                <defs><mask id="m"><rect width="100" height="100" fill="white"/><path d="M50 65 C45 60 30 55 30 42 A12 12 0 0 1 50 35 A12 12 0 0 1 70 42 C70 55 55 60 50 65" fill="black"/></mask></defs>
                <path class="base-bubble" d="M20 15 H80 Q88 15 88 23 V68 Q88 76 80 76 H45 L30 90 V76 Q12 76 12 68 V23 Q12 15 20 15 Z" mask="url(#m)"/>
                <path id="voiceIndicator" class="outline-trace" d="M20 15 H80 Q88 15 88 23 V68 Q88 76 80 76 H45 L30 90 V76 Q12 76 12 68 V23 Q12 15 20 15 Z"/>
                <path class="heart-cutout" d="M50 65 C45 60 30 55 30 42 A12 12 0 0 1 50 35 A12 12 0 0 1 70 42 C70 55 55 60 50 65"/>
            </svg>
        </div>
        <div id="brandName" style="font-size: 3.5rem; font-weight: 800; letter-spacing: -3px; margin-top: 10px;">LoveTalk</div>
        <div id="status">READY</div>

        <div class="callButtons">
            <button class="circleBtn" id="muteBtn" onclick="muteT()">
                <svg viewBox="0 0 100 100" width="48"><g fill="white"><rect x="44" y="25" width="12" height="30" rx="6" /><path d="M35 46 a15 15 0 0 0 30 0" fill="none" stroke="white" stroke-width="5"/></g></svg>
                <div class="label-tag" id="muteTag">MUTE</div>
            </button>
            <button id="callBtn" class="circleBtn" onclick="handleCall()">
                <svg viewBox="0 0 100 100" width="55"><rect x="35" y="20" width="30" height="60" rx="6" fill="none" stroke="white" stroke-width="3"/><rect id="phoneScreen" x="39" y="25" width="22" height="42" rx="2" fill="#4BFF8B"/><circle cx="50" cy="72" r="3" fill="white"/></svg>
                <div class="label-tag" id="callTag">CALL</div>
            </button>
            <button class="circleBtn" id="addBtn" onclick="handleAdd()">
                <svg viewBox="0 0 100 100" width="35"><path d="M50 30 v40 M30 50 h40" stroke="white" stroke-width="10" stroke-linecap="round"/></svg>
                <div class="label-tag">ADD</div>
            </button>
            <button class="circleBtn" id="reportBtn" onclick="handleReport()">
                <svg viewBox="0 0 100 100" width="85"><text x="50" y="68" text-anchor="middle" fill="white" font-size="55" font-weight="900">!</text></svg>
                <div class="label-tag">REPORT</div>
            </button>
        </div>

        <div class="extra-spacing">
            <label class="pill-label">
                <input type="checkbox" id="autoCheck" style="accent-color: white;"> Auto Call
            </label>
            <span class="pill-label" onclick="openMod('hModal')">History</span>
        </div>
    </div>
</div>

<div id="footerSpace">
    <h2>The Mission</h2>
    <p>LoveTalk connects humans directly. Pure conversation. No tracking.</p>
</div>
<footer>&copy; 2026 LOVETALK NETWORKS // ENCRYPTED</footer>

<div id="hModal" class="modal">
    <h3>History</h3>
    <div id="historyList" style="max-height:150px; overflow-y:auto; color:white; font-size:12px; margin:15px 0;"></div>
    <button class="theme-btn" onclick="cls()">Close</button>
</div>

<div id="cModal" class="modal">
    <h3>Canvas</h3>
    <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:10px; margin:15px 0;">
        <div style="height:40px; border-radius:8px; background:linear-gradient(-45deg, #FF9A8B, #FF6A88, #FF99AC); cursor:pointer;" onclick="setBg('linear-gradient(-45deg, #FF9A8B, #FF6A88, #FF99AC)')"></div>
        <div style="height:40px; border-radius:8px; background:#001a33; cursor:pointer;" onclick="setBg('#001a33')"></div>
        <div style="height:40px; border-radius:8px; background:#1a1a1a; cursor:pointer;" onclick="setBg('#1a1a1a')"></div>
    </div>
    <button class="theme-btn" onclick="cls()">Done</button>
</div>

<script>
let peer = "";
let historyList = [];
let audioContext, analyser;
let isMuted = false;

function openMod(id) { document.getElementById(id).style.display='block'; }
function cls() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); }
function setBg(c) { document.body.style.background = c; cls(); }
function toggleTab(id) { 
    const el = document.getElementById(id);
    el.style.display = (el.style.display === 'none') ? 'block' : 'none';
}

function muteT() {
    isMuted = !isMuted;
    document.getElementById('muteBtn').style.background = isMuted ? "#FF4B4B" : "rgba(255,255,255,0.15)";
    document.getElementById('muteTag').textContent = isMuted ? "MUTED" : "MUTE";
}

function handleAdd() {
    if(!peer) return;
    document.getElementById('connEmpty').style.display = 'none';
    const d = document.createElement('div'); 
    d.textContent = "♥ " + peer; 
    d.style.padding = "5px 0";
    d.style.borderBottom = "1px solid rgba(255,255,255,0.1)";
    document.getElementById('connDD').appendChild(d);
    
    const btn = document.getElementById('addBtn');
    btn.style.background = "#4BFF8B";
    setTimeout(() => btn.style.background = "rgba(255,255,255,0.15)", 500);
}

function handleReport() {
    const btn = document.getElementById('reportBtn');
    btn.style.background = "#FF4B4B";
    setTimeout(() => {
        btn.style.background = "rgba(255,255,255,0.15)";
        if(peer) endCall();
    }, 500);
}

function handleCall() {
    const btn = document.getElementById('callBtn');
    if (peer) endCall(); else startSearch();
}

function startSearch() {
    document.getElementById('status').textContent = "FINDING SOMEONE...";
    document.getElementById('phoneScreen').style.fill = "#4BFF8B";
    
    setTimeout(() => {
        peer = "Human_" + Math.floor(Math.random()*999);
        document.getElementById('status').textContent = "LINKED: " + peer;
        document.getElementById('chatPeerName').textContent = peer;
        document.getElementById('callTag').textContent = "END";
        document.getElementById('phoneScreen').style.fill = "#FF4B4B";
        document.getElementById('chatBox').style.display = 'flex';
        historyList.push(peer);
        updateHistory();
        initAudio();
    }, 1200);
}

function endCall() {
    document.getElementById('chatBox').style.display = 'none';
    document.getElementById('status').textContent = "READY";
    document.getElementById('callTag').textContent = "CALL";
    document.getElementById('phoneScreen').style.fill = "#4BFF8B";
    document.getElementById('messages').innerHTML = "";
    peer = "";
    
    if(document.getElementById('autoCheck').checked) {
        setTimeout(startSearch, 1000);
    }
}

async function fetchMemes() {
    const grid = document.getElementById('memeGallery');
    grid.innerHTML = "<div style='color:black; padding:20px; font-size:12px;'>Loading...</div>";
    try {
        const res = await fetch('https://api.imgflip.com/get_memes');
        const data = await res.json();
        const memes = data.data.memes.slice(0, 60);
        grid.innerHTML = memes.map(m => `<img src="${m.url}" class="meme-thumb" onclick="sendMeme('${m.url}')">`).join('');
    } catch(e) { grid.innerHTML = "Error."; }
}

function toggleMemeGallery() {
    const g = document.getElementById('memeGallery');
    g.style.display = g.style.display === 'grid' ? 'none' : 'grid';
    if(g.style.display === 'grid') fetchMemes();
}

function sendMsg() {
    const input = document.getElementById('msgInput');
    if(!input.value.trim()) return;
    const msg = document.createElement('div');
    msg.className = "msg-bubble mine";
    msg.textContent = input.value;
    document.getElementById('messages').appendChild(msg);
    input.value = "";
    document.getElementById('messages').scrollTop = 9999;
}

function sendMeme(url) {
    const msg = document.createElement('div');
    msg.className = "msg-bubble mine";
    msg.innerHTML = `<img src="${url}" style="width:100%; border-radius:10px;">`;
    document.getElementById('messages').appendChild(msg);
    document.getElementById('messages').scrollTop = 9999;
}

function updateHistory() {
    document.getElementById('historyList').innerHTML = historyList.map(h => `<div style="padding:5px; border-bottom:1px solid #333;">♥ ${h}</div>`).join('');
}

async function initAudio() {
    if(audioContext) return;
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioContext = new (window.AudioContext)();
        analyser = audioContext.createAnalyser();
        const source = audioContext.createMediaStreamSource(stream);
        source.connect(analyser);
        processVoice();
    } catch(e) {}
}

function processVoice() {
    if(!analyser || !peer) return;
    requestAnimationFrame(processVoice);
    const data = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(data);
    let vol = data.reduce((a,b) => a+b) / data.length;
    const indicator = document.getElementById('voiceIndicator');
    if(vol > 5) { 
        indicator.style.display = "block";
        document.documentElement.style.setProperty('--logo-dash', Math.max(0, 400 - (vol * 5)));
        document.documentElement.style.setProperty('--heart-fill', '1');
    } else {
        indicator.style.display = "none";
        document.documentElement.style.setProperty('--heart-fill', '0');
    }
}
</script>
</body>
</html>
