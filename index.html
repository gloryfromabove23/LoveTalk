<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LoveTalk | Connection Refined</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root { 
    --bg: #000000;
    --card: #1c1c1e;
    --card-hover: #2c2c2e;
    --text: #ffffff;
    --text-dim: #8e8e93;
    --ios-blue: #007aff;
    --ios-green: #34c759;
    --ios-red: #ff3b30;
    --glass: rgba(255, 255, 255, 0.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body { 
    font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
    background-color: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    overflow: hidden;
}

/* SIDEBAR - CLEANER & TIGHTER */
#sidebar {
    width: 280px;
    background: #000;
    border-right: 1px solid var(--glass);
    display: flex;
    flex-direction: column;
    padding: 20px 15px;
    gap: 15px;
}

.logo-container { display: flex; align-items: center; gap: 10px; padding-bottom: 15px; }
.logo-icon { width: 32px; height: 32px; fill: none; stroke: white; stroke-width: 6; }
.logo-text { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
.logo-text span { color: var(--ios-blue); }

.section-label { font-size: 10px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.2px; margin: 10px 5px 5px; }

.panel { background: var(--card); border-radius: 18px; padding: 12px; border: 1px solid var(--glass); }

.scroll-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
.list-item { 
    display: flex; justify-content: space-between; align-items: center; 
    padding: 10px 12px; border-radius: 12px; font-size: 14px; cursor: pointer; transition: 0.2s;
}
.list-item:hover { background: var(--card-hover); }

/* MAIN APP */
#mainApp { flex: 1; display: flex; flex-direction: column; position: relative; background: #000; }

#msgBox { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
.bubble { max-width: 75%; padding: 10px 16px; border-radius: 20px; font-size: 15px; line-height: 1.4; }
.mine { align-self: flex-end; background: var(--ios-blue); color: white; border-bottom-right-radius: 4px; }
.other { align-self: flex-start; background: #262629; color: white; border-bottom-left-radius: 4px; }
.sys { align-self: center; font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin: 10px 0; }

/* BOTTOM HUB - EVERYTHING AT THUMB REACH */
.bottom-hub {
    background: rgba(28, 28, 30, 0.9);
    backdrop-filter: blur(25px);
    border-top: 1px solid var(--glass);
    padding: 15px 20px 30px;
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.interaction-row { display: flex; align-items: center; gap: 10px; }

.ios-input-wrap { flex: 1; background: #000; border-radius: 22px; padding: 4px 12px; border: 1px solid var(--glass); display: flex; align-items: center; }
.ios-input-wrap input { flex: 1; background: none; border: none; color: white; padding: 8px; outline: none; font-size: 15px; }

.action-bar { display: flex; gap: 8px; }
.circle-btn {
    width: 44px; height: 44px; border-radius: 50%; border: none; 
    display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s;
}
.call-btn { width: 100%; border-radius: 14px; height: 48px; font-weight: 700; font-size: 15px; border: none; color: white; transition: 0.3s; }
.bg-blue { background: var(--ios-blue); }
.bg-red { background: var(--ios-red); }
.bg-glass { background: var(--glass); color: white; }

/* OVERLAY MENU */
#actionSheet {
    position: absolute; bottom: 0; left: 0; right: 0; background: #1c1c1e;
    border-radius: 20px 20px 0 0; transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); padding: 20px; z-index: 1000;
}
#actionSheet.active { transform: translateY(0); }
.sheet-btn { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--card-light); color: white; font-size: 16px; margin-bottom: 10px; font-weight: 600; cursor: pointer; }

@media (max-width: 800px) {
    body { flex-direction: column; }
    #sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--glass); height: 180px; }
}
</style>
</head>
<body>

<aside id="sidebar">
    <div class="logo-container">
        <svg class="logo-icon" viewBox="0 0 100 100">
            <path d="M50 80 C50 80 20 55 20 35 A15 15 0 0 1 50 35 A15 15 0 0 1 80 35 C80 55 50 80 50 80" stroke="white" stroke-width="6"/>
            <path d="M75 20 Q95 20 95 40" stroke="#007aff" stroke-width="4" stroke-linecap="round"/>
        </svg>
        <h1 class="logo-text">Love<span>Talk</span></h1>
    </div>

    <div class="panel" style="padding: 8px 12px; display: flex; justify-content: space-between; align-items: center;">
        <span style="font-size: 12px; color: var(--text-dim);">Auto-Reconnect</span>
        <input type="checkbox" id="autoCall" style="accent-color: var(--ios-green);">
    </div>

    <p class="section-label">Friends</p>
    <div class="scroll-list" id="friendList"></div>

    <p class="section-label">History</p>
    <div class="scroll-list" id="historyList"></div>
</aside>

<main id="mainApp">
    <div id="msgBox">
        <div class="sys">Ready to start a new connection</div>
    </div>

    <div class="bottom-hub">
        <button id="mainToggle" onclick="toggleConnect()" class="call-btn bg-blue">Start Discovery</button>

        <div id="activeControls" style="display: none; flex-direction: column; gap: 12px;">
            <div class="interaction-row">
                <button class="circle-btn bg-glass" onclick="addFriend()" title="Add Friend">♥</button>
                <div class="ios-input-wrap">
                    <input type="text" id="msgInput" placeholder="iMessage" onkeydown="if(event.key==='Enter')sendMsg()">
                    <button onclick="sendMsg()" style="background:var(--ios-blue); border:none; color:white; width:28px; height:28px; border-radius:50%; cursor:pointer;">↑</button>
                </div>
                <button class="circle-btn bg-glass" onclick="blockReport()" style="color:var(--ios-red)">!</button>
            </div>
        </div>
    </div>

    <div id="actionSheet">
        <h3 id="sheetTitle" style="text-align:center; margin-bottom:15px; font-size:14px; color:var(--text-dim);">User Actions</h3>
        <button class="sheet-btn" style="color:var(--ios-blue)" onclick="callFromSheet()">Start Chat</button>
        <button class="sheet-btn" style="color:var(--ios-red)" onclick="removeFromSheet()">Remove</button>
        <button class="sheet-btn" style="background:#3a3a3c" onclick="closeSheet()">Cancel</button>
    </div>
</main>

<script>
let activePeer = null;
let selectedUser = null; // For the action sheet
let friends = JSON.parse(localStorage.getItem('lt_friends') || '[]');
let history = JSON.parse(localStorage.getItem('lt_history') || '[]');

const adj = ["Cyber", "Neon", "Silk", "Mellow", "Lunar", "Swift"];
const names = ["Vibe", "Soul", "Ghost", "Echo", "Wave", "Flow"];

function genName() { return adj[Math.floor(Math.random()*adj.length)] + names[Math.floor(Math.random()*names.length)] + Math.floor(Math.random()*99); }

function init() { renderLists(); }

function toggleConnect() {
    activePeer ? disconnect() : startSearch();
}

function startSearch() {
    const btn = document.getElementById('mainToggle');
    btn.innerText = "Searching...";
    btn.style.opacity = "0.7";

    setTimeout(() => {
        activePeer = genName();
        btn.innerText = "End Call with " + activePeer;
        btn.className = "call-btn bg-red";
        btn.style.opacity = "1";
        document.getElementById('activeControls').style.display = "flex";
        addMsg("Connection secured.", "sys");
        addToHistory(activePeer);
    }, 1200);
}

function disconnect() {
    addMsg("Call ended.", "sys");
    activePeer = null;
    const btn = document.getElementById('mainToggle');
    btn.innerText = "Start Discovery";
    btn.className = "call-btn bg-blue";
    document.getElementById('activeControls').style.display = "none";
    if(document.getElementById('autoCall').checked) setTimeout(startSearch, 1000);
}

function sendMsg() {
    const input = document.getElementById('msgInput');
    if(!input.value.trim() || !activePeer) return;
    addMsg(input.value, 'mine');
    input.value = "";
    setTimeout(() => { if(activePeer) addMsg("That's deep.", "other"); }, 1000);
}

function addMsg(text, type) {
    const box = document.getElementById('msgBox');
    const div = document.createElement('div');
    div.className = "bubble " + type;
    div.innerText = text;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}

function addToHistory(name) {
    history = [{name, time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}, ...history.filter(i => i.name !== name)].slice(0, 5);
    localStorage.setItem('lt_history', JSON.stringify(history));
    renderLists();
}

function addFriend() {
    if(activePeer && !friends.includes(activePeer)) {
        friends.push(activePeer);
        localStorage.setItem('lt_friends', JSON.stringify(friends));
        renderLists();
        alert("Added to Friends");
    }
}

function renderLists() {
    const fBox = document.getElementById('friendList');
    const hBox = document.getElementById('historyList');
    
    fBox.innerHTML = friends.length ? friends.map(f => `<div class="list-item" onclick="openSheet('${f}')"><span>${f}</span><span>♥</span></div>`).join('') : '<div style="font-size:12px;color:#444;padding:10px;">Empty</div>';
    
    hBox.innerHTML = history.length ? history.map(h => `<div class="list-item" onclick="openSheet('${h.name}')"><span>${h.name}</span><span style="font-size:10px;color:#444">${h.time}</span></div>`).join('') : '<div style="font-size:12px;color:#444;padding:10px;">None</div>';
}

function openSheet(user) {
    selectedUser = user;
    document.getElementById('sheetTitle').innerText = "Options for " + user;
    document.getElementById('actionSheet').classList.add('active');
}

function closeSheet() { document.getElementById('actionSheet').classList.remove('active'); }

function callFromSheet() {
    closeSheet();
    if(activePeer) disconnect();
    setTimeout(() => {
        activePeer = selectedUser;
        document.getElementById('mainToggle').innerText = "End Call with " + activePeer;
        document.getElementById('mainToggle').className = "call-btn bg-red";
        document.getElementById('activeControls').style.display = "flex";
        addMsg("Chat started with friend: " + activePeer, "sys");
    }, 500);
}

function removeFromSheet() {
    friends = friends.filter(f => f !== selectedUser);
    history = history.filter(h => h.name !== selectedUser);
    localStorage.setItem('lt_friends', JSON.stringify(friends));
    localStorage.setItem('lt_history', JSON.stringify(history));
    renderLists();
    closeSheet();
}

function blockReport() { if(confirm("Block user?")) disconnect(); }

init();
</script>
</body>
</html>
