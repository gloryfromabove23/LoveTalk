<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="description" content="LoveTalk: Chat and make random voice calls!">
<meta name="keywords" content="chat, voice call, live users, stranger, random call">
<meta name="robots" content="index, follow">
<title>LoveTalk 💖</title>
<link href="https://fonts.googleapis.com/css2?family=Bubblegum+Sans&display=swap" rel="stylesheet">
<style>
body {
    margin:0;
    font-family:'Bubblegum Sans', cursive;
    background: linear-gradient(135deg,#ffc1cc,#ffb6c1);
    display:flex;
    flex-direction:column;
    align-items:center;
    min-height:100vh;
}

h1 {
    color:#fff;
    text-shadow:2px 2px #ff69b4;
    margin:20px 0;
}

#nameInputDiv {
    display:flex;
    gap:10px;
    margin:20px 0;
    flex-wrap:wrap;
}
#nameInput { padding:15px; font-size:1.2rem; border-radius:15px; border:none; outline:none; box-shadow:0 0 10px #ff69b4aa; flex:1; min-width:150px;}
#nameBtn { padding:15px 25px; font-size:1.2rem; border-radius:15px; border:none; background:linear-gradient(45deg,#ff69b4,#ff1493); color:#fff; cursor:pointer; box-shadow:0 0 15px #ff69b4aa; }

#main { display:flex; width:95%; max-width:1200px; flex:1; gap:15px; }
#chatArea { flex:2; display:flex; flex-direction:column; background: rgba(255,255,255,0.2); border-radius:15px; padding:10px; min-width:0; }
#messages { flex:1; overflow-y:auto; border:2px solid #fff; border-radius:10px; padding:10px; background: rgba(255,255,255,0.3); font-size:1rem; }
#chatControls { display:flex; gap:10px; margin-top:10px; }
#chatControls input { flex:1; padding:10px; border-radius:10px; border:none; outline:none; font-size:1rem; }
#chatControls button { padding:10px 15px; border:none; border-radius:10px; background:#ff69b4; color:#fff; cursor:pointer; font-size:1rem; }

#users { flex:1; background: rgba(255,255,255,0.2); border-radius:15px; padding:10px; max-width:250px; }
#users h3 { margin-top:0; color:#fff; text-align:center; }
.userItem { padding:5px; background:rgba(255,255,255,0.3); margin:5px 0; border-radius:5px; text-align:center; cursor:pointer; }

#heartEmoji { font-size:100px; text-align:center; margin:20px auto; transition: transform 0.2s ease; }
.bouncing { animation: bounce 0.5s infinite; }
@keyframes bounce {0%,100%{transform:translateY(0);}50%{transform:translateY(-20px);}}

#voiceControls { margin-top:10px; display:flex; gap:15px; justify-content:center; flex-wrap:wrap; }
#voiceControls button { padding:20px 30px; font-size:1.2rem; border-radius:15px; border:none; background:linear-gradient(45deg,#ff69b4,#ff1493); color:#fff; cursor:pointer; box-shadow:0 0 20px #ff69b4aa; }

#incomingCallPopup { display:none; position:fixed; bottom:30px; right:30px; background:white; padding:20px; border-radius:15px; box-shadow:0 5px 20px rgba(0,0,0,0.3); }
#callingStatus { display:none; color:white; margin-top:10px; text-align:center; font-weight:bold; }

/* -------------------- Mobile -------------------- */
@media screen and (max-width:768px){
    #main { flex-direction:column; width:95%; }
    #chatArea { width:100%; }
    #users { width:100%; max-width:100%; margin-top:10px; }
    #heartEmoji { font-size:80px; }
    #voiceControls button { flex:1; font-size:1.3rem; padding:15px; }
}
</style>
</head>
<body>

<h1>LoveTalk 💖</h1>

<div id="heartEmoji">💖</div>

<div id="nameInputDiv">
    <input id="nameInput" placeholder="Enter your name..." />
    <button id="nameBtn">Join</button>
</div>

<div id="main" style="display:none;">
    <div id="chatArea">
        <div id="messages"></div>
        <div id="chatControls">
            <input id="msgInput" placeholder="Type your message..." />
            <button id="sendBtn">Send</button>
        </div>
        <div id="voiceControls">
            <button id="newChat">🔄 New</button>
            <button id="leaveChat">❌ Leave</button>
            <label><input type="checkbox" id="autoCall" /> Auto-Call</label>
        </div>
        <div id="callingStatus">📞 Calling...</div>
    </div>

    <div id="users">
        <h3>Live Users</h3>
        <div id="userList"></div>
    </div>
</div>

<div id="incomingCallPopup">
    <p id="callerName"></p>
    <button id="acceptCall">✅ Accept</button>
    <button id="declineCall">❌ Decline</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="client.js"></script>
</body>
</html>
