<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LoveTalk ♥︎</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Inter',sans-serif;
    background:#16171b;
    color:white;
    display:flex;
    height:100vh;
    overflow:hidden;
    position:relative;
}

/* ---------------- ABSTRACT BACKGROUND BLOBS ---------------- */
body::before,
body::after{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    border-radius:50%;
    filter:blur(120px);
    z-index:-1;
}

body::before{
    background:#F0A2A4;
    top:-150px;
    left:-150px;
    opacity:0.4;
}

body::after{
    background:#ff6f91;
    bottom:-200px;
    right:-150px;
    opacity:0.3;
}

/* ---------------- LAYOUT ---------------- */
#leftPanel{
    width:420px;
    background:#1f2025;
    display:flex;
    flex-direction:column;
    padding:25px;
    position:relative;
}

#centerPanel{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

#rightPanel{
    width:280px;
    background:#1f2025;
    padding:25px;
    overflow-y:auto;
}

/* ---------------- LOGO ---------------- */
#mainLogo{
    width:260px;
    transition:transform 0.08s linear;
}

#brandName{
    font-size:2rem;
    font-weight:800;
    margin-top:15px;
    letter-spacing:-1px;
}

.accent{
    color:#F0A2A4;
}

/* ---------------- CHAT BOX ---------------- */
#chatBox{
    flex:1;
    border-radius:25px;
    background:rgba(255,255,255,0.04);
    backdrop-filter:blur(20px);
    display:flex;
    flex-direction:column;
    padding:20px;
    position:relative;
    overflow:hidden;
}

/* wallpaper logo */
#chatBox::before{
    content:"";
    position:absolute;
    width:350px;
    height:350px;
    background:url('data:image/svg+xml;utf8,\
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">\
<rect x="10" y="10" width="70" height="70" rx="20" fill="%23F0A2A4"/>\
<polygon points="30,80 45,95 45,80" fill="%23F0A2A4"/>\
</svg>');
    background-repeat:no-repeat;
    background-size:contain;
    opacity:0.05;
    bottom:-60px;
    right:-60px;
}

/* ---------------- CHAT ---------------- */
#messages{
    flex:1;
    overflow-y:auto;
}

#chatControls{
    display:flex;
    gap:10px;
    margin-top:15px;
}

#chatControls input{
    flex:1;
    padding:12px;
    border-radius:12px;
    border:none;
    background:#2b2c32;
    color:white;
}

#chatControls button{
    padding:12px 18px;
    border-radius:12px;
    border:none;
    background:#F0A2A4;
    color:black;
    font-weight:700;
    cursor:pointer;
    transition:0.2s;
}

#chatControls button:hover{
    transform:scale(1.05);
}

/* ---------------- USERS ---------------- */
#rightPanel h3{
    font-weight:800;
    margin-top:0;
}

.userItem{
    background:#2b2c32;
    padding:12px;
    border-radius:12px;
    margin-bottom:10px;
    display:flex;
    justify-content:space-between;
}

.statusDot{
    width:8px;
    height:8px;
    border-radius:50%;
    background:#F0A2A4;
}

/* ---------------- STATUS ---------------- */
#status{
    margin-top:10px;
    font-weight:600;
    color:#F0A2A4;
}
</style>
</head>

<body>

<!-- LEFT CHAT -->
<div id="leftPanel">
    <div id="chatBox">
        <div id="messages"></div>
        <div id="chatControls">
            <input id="msgInput" placeholder="Say something...">
            <button id="sendBtn">Send</button>
        </div>
    </div>
</div>

<!-- CENTER LOGO -->
<div id="centerPanel">

    <!-- CUSTOM SPEECH BUBBLE LOGO -->
    <svg id="mainLogo" viewBox="0 0 100 100">
        <rect x="10" y="10" width="70" height="70" rx="20" fill="#F0A2A4"/>
        <polygon points="30,80 45,95 45,80" fill="#F0A2A4"/>
        <path d="M50 65
        C35 50,30 40,40 35
        C45 32,50 38,50 38
        C50 38,55 32,60 35
        C70 40,65 50,50 65Z" fill="white"/>
    </svg>

    <div id="brandName">
        Love<span class="accent">Talk</span>
    </div>

    <div id="status">Online</div>

</div>

<!-- RIGHT USERS -->
<div id="rightPanel">
    <h3>People Online</h3>
    <div id="userList"></div>
</div>

<script>
/* ---------------- PULSE LOGO TO VOICE ---------------- */
let audioContext, analyser, microphone, dataArray;

navigator.mediaDevices.getUserMedia({audio:true}).then(stream=>{
    audioContext=new(window.AudioContext||window.webkitAudioContext)();
    analyser=audioContext.createAnalyser();
    microphone=audioContext.createMediaStreamSource(stream);
    microphone.connect(analyser);
    analyser.fftSize=256;

    dataArray=new Uint8Array(analyser.frequencyBinCount);
    const logo=document.getElementById("mainLogo");

    function animate(){
        analyser.getByteFrequencyData(dataArray);
        let avg=dataArray.reduce((a,b)=>a+b)/dataArray.length;
        let scale=1+avg/160;
        logo.style.transform=`scale(${scale})`;
        requestAnimationFrame(animate);
    }
    animate();
});

/* ---------------- TAB VISIBILITY STATUS ---------------- */
const status=document.getElementById("status");
function updateStatus(){
    if(document.hidden){
        status.textContent="Offline";
        status.style.color="#777";
    }else{
        status.textContent="Online";
        status.style.color="#F0A2A4";
    }
}
document.addEventListener("visibilitychange",updateStatus);
updateStatus();

/* ---------------- CHAT DEMO ---------------- */
sendBtn.onclick=()=>{
    if(msgInput.value.trim()){
        let p=document.createElement("p");
        p.textContent=msgInput.value;
        messages.appendChild(p);
        msgInput.value="";
        messages.scrollTop=messages.scrollHeight;
    }
};
</script>

</body>
</html>
