<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LoveTalk | Request & Connect</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root { 
    --bg: #000000;
    --card: #1c1c1e;
    --card-hover: #2c2c2e;
    --text: #ffffff;
    --text-dim: #8e8e93;
    --ios-blue: #007aff;
    --ios-green: #34c759;
    --ios-red: #ff3b30;
    --glass: rgba(255, 255, 255, 0.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body { 
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Plus Jakarta Sans", sans-serif;
    background-color: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    overflow: hidden;
}

/* SIDEBAR & LOGO */
#sidebar {
    width: 280px;
    background: #000;
    border-right: 1px solid var(--glass);
    display: flex;
    flex-direction: column;
    padding: 20px 15px;
    gap: 15px;
}

.logo-container { display: flex; align-items: center; gap: 12px; padding-bottom: 15px; }
/* NESTED BUBBLE SVG */
.logo-icon { width: 38px; height: 34px; }
.logo-text { font-size: 20px; font-weight: 800; letter-spacing: -0.6px; }
.logo-text span { color: var(--ios-blue); }

.section-label { font-size: 11px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin: 10px 5px 5px; }

/* IOS LISTS - SCROLLABLE */
.scroll-list { 
    max-height: 200px; 
    overflow-y: auto; 
    display: flex; 
    flex-direction: column; 
    gap: 2px;
    scrollbar-width: none;
}
.scroll-list::-webkit-scrollbar { display: none; }

.list-item { 
    display: flex; justify-content: space-between; align-items: center; 
    padding: 12px; border-radius: 12px; font-size: 16px; 
    font-weight: 400; /* iOS standard weight */
    cursor: pointer; transition: background 0.2s;
}
.list-item:hover { background: var(--card-hover); }

/* MAIN APP */
#mainApp { flex: 1; display: flex; flex-direction: column; background: #000; }

#msgBox { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
.bubble { max-width: 75%; padding: 10px 16px; border-radius: 20px; font-size: 16px; line-height: 1.4; }
.mine { align-self: flex-end; background: var(--ios-blue); color: white; border-bottom-right-radius: 4px; }
.other { align-self: flex-start; background: #262629; color: white; border-bottom-left-radius: 4px; }
.sys { align-self: center; font-size: 11px; color: var(--text-dim); text-transform: uppercase; margin: 15px 0; }

/* GIF DRAWER */
#gifDrawer { 
    display: none; grid-template-columns: repeat(4, 1fr); gap: 5px; 
    padding: 10px; background: #1c1c1e; max-height: 200px; overflow-y: auto;
}
.gif-thumb { width: 100%; aspect-ratio: 1; border-radius: 8px; cursor: pointer; object-fit: cover; }

/* BOTTOM CONTROLS */
.bottom-hub {
    background: rgba(28, 28, 30, 0.95);
    backdrop-filter: blur(30px);
    border-top: 1px solid var(--glass);
    padding: 15px 20px 30px;
}

.call-btn { width: 100%; border-radius: 14px; height: 50px; font-weight: 700; font-size: 16px; border: none; color: white; cursor: pointer; }
.bg-blue { background: var(--ios-blue); }
.bg-red { background: var(--ios-red); }

.interaction-row { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
.ios-input-wrap { flex: 1; background: #000; border-radius: 22px; padding: 5px 15px; border: 1px solid var(--glass); display: flex; align-items: center; }
.ios-input-wrap input { flex: 1; background: none; border: none; color: white; padding: 8px; outline: none; font-size: 16px; }

/* ACTION SHEET */
#actionSheet {
    position: absolute; bottom: 0; left: 0; right: 0; background: #1c1c1e;
    border-radius: 20px 20px 0 0; transform: translateY(100%);
    transition: transform 0.3s ease; padding: 20px; z-index: 1000;
}
#actionSheet.active { transform: translateY(0); }
.sheet-btn { width: 100%; padding: 16px; border-radius: 14px; border: none; background: #2c2c2e; color: white; font-size: 17px; margin-bottom: 8px; font-weight: 600; }

/* REQUEST MODAL */
#requestModal {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    background: #1c1c1e; padding: 30px; border-radius: 24px; width: 80%;
    text-align: center; border: 1px solid var(--glass); display: none; z-index: 2000;
}
</style>
</head>
<body>

<aside id="sidebar">
    <div class="logo-container">
        <svg class="logo-icon" viewBox="0 0 100 80">
            <path d="M0,10 Q0,0 10,0 L70,0 Q80,0 80,10 L80,50 Q80,60 70,60 L20,60 L0,80 Z" fill="white"/>
            <path d="M40 45 C40 45 20 30 20 18 A10 10 0 0 1 40 18 A10 10 0 0 1 60 18 C60 30 40 45 40 45" fill="#000"/>
            <circle cx="75" cy="30" r="3" fill="#007aff"/>
            <circle cx="85" cy="30" r="3" fill="#007aff"/>
        </svg>
        <h1 class="logo-text">Love<span>Talk</span></h1>
    </div>

    <p class="section-label">Friends</p>
    <div class="scroll-list" id="friendList"></div>

    <p class="section-label">Call History</p>
    <div class="scroll-list" id="historyList"></div>
</aside>

<main id="mainApp">
    <div id="msgBox">
        <div class="sys">Press the button below to start looking.</div>
    </div>

    <div id="gifDrawer"></div>

    <div class="bottom-hub">
        <button id="mainToggle" onclick="toggleConnect()" class="call-btn bg-blue">Start Discovery</button>
        
        <div id="activeControls" style="display: none;">
            <div class="interaction-row">
                <button onclick="toggleGifs()" style="background:none; border:none; font-size:22px; cursor:pointer;">✨</button>
                <div class="ios-input-wrap">
                    <input type="text" id="msgInput" placeholder="iMessage" onkeydown="if(event.key==='Enter')sendMsg()">
                </div>
                <button onclick="sendMsg()" style="background:var(--ios-blue); border:none; color:white; width:30px; height:30px; border-radius:50%; font-weight:bold; cursor:pointer;">↑</button>
            </div>
            <div style="display:flex; gap:10px; margin-top:10px;">
                <button class="call-btn" style="background:var(--glass); flex:1;" onclick="addFriend()">Add Friend</button>
                <button class="call-btn bg-red" style="flex:1;" onclick="disconnect()">End Chat</button>
            </div>
        </div>
    </div>

    <div id="requestModal">
        <h2 id="reqName" style="margin-bottom:10px;">User found!</h2>
        <p style="color:var(--text-dim); margin-bottom:20px;">Would you like to connect?</p>
        <div style="display:flex; gap:10px;">
            <button class="call-btn bg-blue" onclick="acceptRequest()">Accept</button>
            <button class="call-btn bg-red" onclick="cancelRequest()">Decline</button>
        </div>
    </div>

    <div id="actionSheet">
        <h3 id="sheetTitle" style="text-align:center; margin-bottom:15px; font-size:14px; color:var(--text-dim);">Options</h3>
        <button class="sheet-btn" style="color:var(--ios-blue)" onclick="requestFromSheet()">Send Chat Request</button>
        <button class="sheet-btn" style="color:var(--ios-red)" onclick="removeFromSheet()">Remove</button>
        <button class="sheet-btn" style="background:#3a3a3c" onclick="closeSheet()">Cancel</button>
    </div>
</main>

<script>
let activePeer = null;
let pendingPeer = null;
let selectedUser = null;
let friends = JSON.parse(localStorage.getItem('lt_friends') || '[]');
let history = JSON.parse(localStorage.getItem('lt_history') || '[]');

const adj = ["Neon", "Silk", "Lunar", "Swift", "Glitch", "Cosmic"];
const names = ["Soul", "Ghost", "Echo", "Wave", "Flow", "Noodle"];

function genName() { return adj[Math.floor(Math.random()*adj.length)] + names[Math.floor(Math.random()*names.length)] + Math.floor(Math.random()*99); }

function init() { 
    renderLists(); 
    loadGifs();
}

function toggleConnect() {
    if(activePeer) disconnect();
    else {
        document.getElementById('mainToggle').innerText = "Searching...";
        setTimeout(() => {
            pendingPeer = genName();
            document.getElementById('reqName').innerText = pendingPeer;
            document.getElementById('requestModal').style.display = 'block';
        }, 1200);
    }
}

function acceptRequest() {
    activePeer = pendingPeer;
    document.getElementById('requestModal').style.display = 'none';
    document.getElementById('mainToggle').style.display = 'none';
    document.getElementById('activeControls').style.display = 'block';
    addMsg("Connected to " + activePeer, "sys");
    addToHistory(activePeer);
}

function cancelRequest() {
    document.getElementById('requestModal').style.display = 'none';
    document.getElementById('mainToggle').innerText = "Start Discovery";
}

function disconnect() {
    activePeer = null;
    document.getElementById('activeControls').style.display = 'none';
    document.getElementById('mainToggle').style.display = 'block';
    document.getElementById('mainToggle').innerText = "Start Discovery";
    addMsg("Disconnected.", "sys");
}

function sendMsg() {
    const input = document.getElementById('msgInput');
    if(!input.value.trim() || !activePeer) return;
    addMsg(input.value, 'mine');
    input.value = "";
    setTimeout(() => { if(activePeer) addMsg("Haha, cool!", "other"); }, 1000);
}

function addMsg(text, type) {
    const box = document.getElementById('msgBox');
    const div = document.createElement('div');
    div.className = "bubble " + type;
    div.innerHTML = text;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}

function toggleGifs() {
    const d = document.getElementById('gifDrawer');
    d.style.display = d.style.display === 'grid' ? 'none' : 'grid';
}

async function loadGifs() {
    const r = await fetch('https://api.imgflip.com/get_memes');
    const j = await r.json();
    document.getElementById('gifDrawer').innerHTML = j.data.memes.slice(0, 60).map(m => 
        `<img src="${m.url}" class="gif-thumb" onclick="sendGif('${m.url}')">`
    ).join('');
}

function sendGif(url) {
    if(!activePeer) return;
    addMsg(`<img src="${url}" style="width:100%; border-radius:10px;">`, "mine");
    toggleGifs();
}

function addToHistory(name) {
    history = [{name, time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}, ...history.filter(i => i.name !== name)].slice(0, 20);
    localStorage.setItem('lt_history', JSON.stringify(history));
    renderLists();
}

function addFriend() {
    if(activePeer && !friends.includes(activePeer)) {
        friends.push(activePeer);
        localStorage.setItem('lt_friends', JSON.stringify(friends));
        renderLists();
    }
}

function renderLists() {
    document.getElementById('friendList').innerHTML = friends.map(f => `<div class="list-item" onclick="openSheet('${f}')"><span>${f}</span><span>♥</span></div>`).join('');
    document.getElementById('historyList').innerHTML = history.map(h => `<div class="list-item" onclick="openSheet('${h.name}')"><span>${h.name}</span><span style="font-size:12px;color:var(--text-dim)">${h.time}</span></div>`).join('');
}

function openSheet(user) {
    selectedUser = user;
    document.getElementById('actionSheet').classList.add('active');
}

function closeSheet() { document.getElementById('actionSheet').classList.remove('active'); }

function requestFromSheet() {
    closeSheet();
    pendingPeer = selectedUser;
    document.getElementById('reqName').innerText = pendingPeer;
    document.getElementById('requestModal').style.display = 'block';
}

function removeFromSheet() {
    friends = friends.filter(f => f !== selectedUser);
    history = history.filter(h => h.name !== selectedUser);
    localStorage.setItem('lt_friends', JSON.stringify(friends));
    localStorage.setItem('lt_history', JSON.stringify(history));
    renderLists();
    closeSheet();
}

init();
</script>
</body>
</html>
